<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#060b06" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>Emily &amp; Travis — RSVP</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light+Two&family=Zen+Loop&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --burnt-orange:  #CC5500;
      --plum:          #673147;
      --plum-border:   rgba(103,49,71,0.40);
      --gold:          #d4aa50;
      --mist:          rgba(248,242,224,0.97);
      --mist-soft:     rgba(242,235,212,0.88);
      --mist-faint:    rgba(240,234,214,0.52);
      --text-main:     rgba(232,225,199,0.92);
      --field-bg:      rgba(4,8,4,0.68);
      --field-border:  rgba(103,49,71,0.32);
      --field-focus:   rgba(204,85,0,0.55);
      --forest-deep:   #060b06;
      --ease-soft:     cubic-bezier(0.25,0.8,0.25,1);
      --ease-default:  cubic-bezier(0.4,0,0.2,1);
      --ease-spring:   cubic-bezier(0.34,1.56,0.64,1);
    }

    html, body {
      width: 100%;
      min-height: 100%;
      font-family: 'Zen Loop', sans-serif;
      background: var(--forest-deep);
      color: var(--text-main);
      overflow-x: hidden;
    }

    /* ── BACKGROUND ── */
    .forest {
      min-height: 100vh;
      min-height: 100dvh;
      background: url("assets/backgrounds/landing.png") center / cover no-repeat;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(3rem, env(safe-area-inset-top)) 1.25rem max(3rem, env(safe-area-inset-bottom));
      overflow: hidden;
      isolation: isolate;
    }

    .forest::before {
      content: "";
      position: absolute; inset: 0; z-index: 1;
      background: radial-gradient(ellipse at center,
        rgba(6,6,6,0.05) 0%,
        rgba(6,6,6,0.25) 55%,
        rgba(6,6,6,0.45) 100%
      );
      pointer-events: none;
      transition: background 0.6s var(--ease-default);
    }

    .forest.mood-yes::before {
      background: radial-gradient(ellipse at center,
        rgba(10,12,6,0.08) 0%,
        rgba(8,10,6,0.32) 55%,
        rgba(6,8,4,0.62) 100%
      );
    }

    .forest.mood-no::before {
      background: radial-gradient(ellipse at center,
        rgba(6,4,8,0.28) 0%,
        rgba(6,4,10,0.55) 55%,
        rgba(4,4,8,0.82) 100%
      );
    }

    .overlay-breathe {
      position: absolute; inset: 0; z-index: 2;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(4,6,4,0.18) 100%);
      pointer-events: none;
      animation: breathePulse 10s ease-in-out infinite;
    }
    @keyframes breathePulse { 0%,100%{opacity:.5} 50%{opacity:1} }

    .overlay-glow {
      position: absolute; inset: 0; z-index: 2;
      background: radial-gradient(ellipse at 50% 38%, rgba(204,85,0,0.05) 0%, transparent 55%);
      pointer-events: none;
      animation: glowShift 18s ease-in-out infinite alternate;
    }
    @keyframes glowShift { 0%{opacity:.4} 100%{opacity:1} }

    .mist-layer {
      position: absolute; inset: auto 0 0 0; height: 28vh; z-index: 3;
      background:
        radial-gradient(ellipse at 20% 100%, rgba(255,255,255,0.022), transparent 36%),
        radial-gradient(ellipse at 50% 100%, rgba(255,255,255,0.034), transparent 42%),
        radial-gradient(ellipse at 80% 100%, rgba(255,255,255,0.024), transparent 38%);
      filter: blur(22px); opacity: 0.88; pointer-events: none;
      animation: mistDrift 22s ease-in-out infinite alternate;
    }
    @keyframes mistDrift {
      0%  { transform: translateX(-2%) translateY(0);   opacity: .68; }
      100%{ transform: translateX(2%)  translateY(-1%); opacity: .95; }
    }

    .fireflies { position: absolute; inset: 0; z-index: 4; pointer-events: none; overflow: hidden; }
    .firefly {
      position: absolute; border-radius: 50%; opacity: 0;
      animation-name: driftFloat, flickerGlow;
      animation-timing-function: linear, ease-in-out;
      animation-iteration-count: infinite;
      will-change: transform, opacity;
    }
    .firefly.color-yellowgreen { background: radial-gradient(circle, rgba(200,240,80,.98) 0%, rgba(160,210,60,.55) 48%, transparent 100%); box-shadow: 0 0 8px rgba(180,230,70,.65), 0 0 20px rgba(160,210,50,.28); }
    .firefly.color-amber       { background: radial-gradient(circle, rgba(255,180,60,.98) 0%, rgba(240,150,30,.55) 48%, transparent 100%); box-shadow: 0 0 8px rgba(255,170,50,.65), 0 0 20px rgba(240,140,20,.28); }
    .firefly.color-gold        { background: radial-gradient(circle, rgba(255,240,140,.98) 0%, rgba(243,211,122,.55) 48%, transparent 100%); box-shadow: 0 0 8px rgba(243,220,120,.65), 0 0 20px rgba(230,200,100,.28); }
    .firefly.color-warmwhite   { background: radial-gradient(circle, rgba(255,252,230,.98) 0%, rgba(255,245,200,.55) 48%, transparent 100%); box-shadow: 0 0 8px rgba(255,248,220,.65), 0 0 20px rgba(255,240,190,.28); }
    .firefly.rise { animation-name: driftRise, flickerGlow; }

    @keyframes driftFloat {
      0%  { transform: translate3d(0,0,0) scale(.88); }
      20% { transform: translate3d(18px,-26px,0) scale(1.07); }
      40% { transform: translate3d(-12px,-42px,0) scale(.94); }
      60% { transform: translate3d(15px,-30px,0) scale(1.11); }
      80% { transform: translate3d(-9px,-15px,0) scale(.97); }
      100%{ transform: translate3d(-5px,0,0) scale(.90); }
    }
    @keyframes driftRise {
      0%  { transform: translate3d(0,0,0) scale(.7); opacity: 0; }
      8%  { opacity: .7; }
      100%{ transform: translate3d(var(--rx,18px),-140px,0) scale(1.1); opacity: 0; }
    }
    @keyframes flickerGlow {
      0%,100%{opacity:.04} 10%{opacity:.68} 26%{opacity:.10}
      48%{opacity:.80} 66%{opacity:.16} 82%{opacity:.55}
    }

    .loading-screen {
      position: fixed; inset: 0; background: var(--forest-deep);
      z-index: 100; pointer-events: none;
      transition: opacity 1s var(--ease-soft);
    }
    .loading-screen.done { opacity: 0; }

    /* ── FORM WRAP ── */
    .form-wrap {
      position: relative; z-index: 6;
      width: 100%; max-width: 460px;
      text-align: center;
      opacity: 0;
      animation: riseIn 900ms var(--ease-soft) forwards;
      animation-delay: 400ms;
    }

    /* ── VINE DIVIDER ── */
    .vine { display: flex; align-items: center; justify-content: center; margin: 1.2rem 0; opacity: 0.65; }
    .vine svg { width: 180px; height: 14px; }

    /* ── LABELS ── */
    .field-label {
      display: block;
      font-family: 'Zen Loop', sans-serif;
      font-size: 0.78rem;
      color: #f3d37a;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 6px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.95), 0 0 20px rgba(0,0,0,0.90);
    }

    /* ── INPUTS + SELECTS ── */
    input[type="text"],
    input[type="number"],
    input[type="email"],
    input[type="tel"],
    select {
      width: 100%;
      padding: 0.82rem 1rem;
      border-radius: 3px;
      border: 1px solid var(--field-border);
      font-size: 0.95rem;
      font-family: 'Zen Loop', sans-serif;
      background: var(--field-bg);
      color: var(--mist);
      outline: none;
      letter-spacing: 0.02em;
      text-align: center;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.55);
      transition: border-color 220ms var(--ease-default), box-shadow 220ms var(--ease-default), background 220ms var(--ease-default);
      -webkit-appearance: none;
    }
    input::placeholder { color: rgba(232,225,199,0.28); font-style: italic; }
    select { cursor: pointer; }
    select option { background: #1a0a10; color: var(--text-main); }

    input:focus, select:focus {
      border-color: var(--field-focus);
      background: rgba(8,12,8,0.88);
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.55),
                  0 0 0 1px rgba(204,85,0,0.25),
                  0 0 14px rgba(204,85,0,0.16);
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="number"] { -moz-appearance: textfield; }

    /* ── FIELD GROUPS ── */
    .field { margin-bottom: 0.9rem; }
    .field.hidden { display: none !important; }

    /* ── ATTENDANCE REACTION ── */
    .reaction {
      font-family: 'Shadows Into Light Two', cursive;
      font-size: 0.92rem;
      color: #f3d37a;
      font-style: italic;
      letter-spacing: 0.03em;
      min-height: 1.4em;
      margin: 0.3rem 0 0.5rem;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 350ms var(--ease-default), transform 350ms var(--ease-default), color 350ms;
    }
    .reaction.show { opacity: 1; transform: translateY(0); }
    .reaction.no   { color: rgba(103,49,71,0.88); }

    /* ── SETUP CHECKLIST ── */
    .checklist {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin-top: 0.5rem;
      text-align: left;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(4,8,4,0.55);
      border: 1px solid var(--field-border);
      border-radius: 3px;
      padding: 0.6rem 0.75rem;
      cursor: pointer;
      transition: border-color 200ms, background 200ms;
    }
    .check-item:has(input:checked) {
      border-color: rgba(204,85,0,0.42);
      background: rgba(204,85,0,0.07);
    }
    .check-item input[type="checkbox"] {
      width: 15px; height: 15px;
      accent-color: var(--burnt-orange);
      cursor: pointer;
      flex-shrink: 0;
      box-shadow: none;
      border: none;
      padding: 0;
      background: none;
      text-align: left;
    }
    .check-item label {
      font-size: 0.78rem;
      color: var(--text-main);
      letter-spacing: 0.02em;
      cursor: pointer;
      text-transform: none;
      text-align: left;
      font-family: 'Zen Loop', sans-serif;
    }

    /* ── SUBMIT BUTTON ── */
    .submit-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 1.4rem auto 0;
      width: 100%;
      max-width: 280px;
      padding: 0.9rem 1.5rem;
      background: rgba(103,49,71,0.55);
      border: 1px solid var(--plum-border);
      border-radius: 3px;
      color: var(--mist);
      font-family: 'Zen Loop', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 0 0 1px rgba(103,49,71,0.12), 0 4px 16px rgba(0,0,0,0.40);
      transition: background 250ms var(--ease-default), border-color 250ms, color 250ms, transform 120ms;
    }
    .submit-btn:hover:not(:disabled) {
      background: rgba(204,85,0,0.18);
      border-color: rgba(204,85,0,0.55);
      color: var(--mist);
    }
    .submit-btn:active:not(:disabled) { transform: scale(0.982); }
    .submit-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .btn-loader { display: none; align-items: center; gap: 0.28rem; }
    .btn-loader.active { display: flex; }
    .btn-text.hidden { display: none; }
    .dot-pulse {
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor; opacity: .9;
      animation: dotPulse 1.1s infinite ease-in-out;
    }
    .dot-pulse:nth-child(2) { animation-delay: .14s; }
    .dot-pulse:nth-child(3) { animation-delay: .28s; }
    @keyframes dotPulse {
      0%,80%,100%{transform:scale(.5);opacity:.35}
      40%{transform:scale(1);opacity:1}
    }

    /* ── RESPONSE STATE ── */
    .response {
      margin-top: 1rem;
      padding: 1.8rem 1.5rem;
      background: rgba(4,6,4,0.72);
      border: 1px solid rgba(103,49,71,0.22);
      border-radius: 3px;
      opacity: 0;
      transform: scale(0.984) translateY(12px);
      transition: opacity 500ms var(--ease-soft), transform 500ms var(--ease-soft);
      pointer-events: none;
    }
    .response.show { opacity: 1; transform: scale(1) translateY(0); pointer-events: auto; }
    .response.hidden { display: none !important; }

    .resp-title {
      font-family: 'Shadows Into Light Two', cursive;
      font-size: 1.4rem;
      color: var(--mist);
      text-shadow: 0 0 12px rgba(204,85,0,0.30);
      margin-bottom: 0.4rem;
    }
    .resp-sub { font-size: 0.92rem; color: var(--mist-faint); font-style: italic; line-height: 1.6; }
    .resp-note { font-size: 0.82rem; color: rgba(204,85,0,0.70); font-style: italic; margin-top: 0.7rem; letter-spacing: 0.03em; }

    .edit-btn {
      margin-top: 1rem;
      background: none; border: none;
      color: var(--mist-faint); font-family: 'Zen Loop', sans-serif;
      font-size: 0.82rem; letter-spacing: 0.06em;
      text-decoration: underline; text-underline-offset: 3px;
      cursor: pointer;
      transition: color 200ms;
    }
    .edit-btn:hover { color: var(--mist); }

    /* ── POPUP ── */
    .popup-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      display: none; align-items: center; justify-content: center;
      z-index: 20; padding: 1rem;
    }
    .popup-overlay.show { display: flex; }
    .popup-box {
      width: min(360px,100%);
      background: rgba(6,8,6,0.96);
      border: 1px solid rgba(103,49,71,0.30);
      padding: 1.6rem 1.2rem 1.4rem;
      border-radius: 4px; text-align: center;
      animation: popIn 0.32s var(--ease-spring);
    }
    @keyframes popIn { from{transform:scale(.92) translateY(8px);opacity:0} to{transform:scale(1) translateY(0);opacity:1} }
    .popup-box p { font-size: 1rem; line-height: 1.55; color: var(--text-main); }
    .popup-close {
      margin-top: 1rem;
      padding: 0.65rem 1.6rem;
      background: transparent;
      border: 1px solid rgba(103,49,71,0.45);
      color: var(--mist);
      border-radius: 3px;
      font-family: 'Zen Loop', sans-serif;
      font-size: 0.88rem; letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer;
      transition: background 200ms;
    }
    .popup-close:hover { background: rgba(103,49,71,0.35); }

    /* ── SPARK BURST ── */
    .spark-burst { position: absolute; inset: 0; pointer-events: none; z-index: 7; overflow: visible; }
    .spark { position: absolute; width: 5px; height: 5px; border-radius: 50%; animation: burstOut 1s var(--ease-default) forwards; }
    .spark.orange { background: rgba(255,140,30,.95); box-shadow: 0 0 10px rgba(255,140,30,.80); }
    .spark.gold   { background: rgba(255,220,100,.95); box-shadow: 0 0 10px rgba(255,220,100,.80); }
    .spark.plum   { background: rgba(180,100,140,.95); box-shadow: 0 0 10px rgba(180,100,140,.80); }
    .leaf { position: absolute; border-radius: 60% 40% 60% 40%; transform: rotate(18deg); animation: leafFall 2.4s var(--ease-default) forwards; pointer-events: none; z-index: 7; }
    .leaf.dark { background: rgba(80,40,20,.65); width: 10px; height: 14px; }
    .leaf.plum { background: rgba(103,49,71,.55); width: 8px; height: 12px; }
    @keyframes burstOut {
      0%{transform:translate(0,0) scale(.4);opacity:0} 18%{opacity:1}
      100%{transform:translate(var(--tx),var(--ty)) scale(1.2);opacity:0}
    }
    @keyframes leafFall {
      0%{opacity:0;transform:translateY(-12px) rotate(0deg) scale(.6)} 12%{opacity:.85}
      100%{opacity:0;transform:translateY(180px) translateX(var(--leafX,18px)) rotate(230deg) scale(1.05)}
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .checklist { grid-template-columns: 1fr; }
    }
    @media (prefers-reduced-motion: reduce) {
      .form-wrap { animation: none; opacity: 1; }
      .overlay-breathe,.overlay-glow,.mist-layer { animation: none; }
      .firefly { display: none; }
      .loading-screen { display: none; }
    }
  </style>
</head>
<body>

  <div class="loading-screen" id="loadingScreen" aria-hidden="true"></div>

  <div class="forest" id="forest">
    <div class="overlay-breathe" aria-hidden="true"></div>
    <div class="overlay-glow"    aria-hidden="true"></div>
    <div class="mist-layer"      aria-hidden="true"></div>
    <div class="fireflies" id="fireflies" aria-hidden="true"></div>

    <div class="form-wrap" id="formWrap">

      <!-- top vine -->
      <div class="vine" aria-hidden="true">
        <svg viewBox="0 0 180 14" fill="none">
          <line x1="0" y1="7" x2="68" y2="7" stroke="#b8922e" stroke-width="0.7" opacity="0.6"/>
          <circle cx="76" cy="7" r="2.5" fill="#b8922e" opacity="0.65"/>
          <circle cx="90" cy="7" r="4" fill="#d4aa50" opacity="0.85"/>
          <circle cx="104" cy="7" r="2.5" fill="#b8922e" opacity="0.65"/>
          <line x1="112" y1="7" x2="180" y2="7" stroke="#b8922e" stroke-width="0.7" opacity="0.6"/>
        </svg>
      </div>

      <form id="rsvpForm" action="https://formspree.io/f/xqewzpgo" method="POST" novalidate>

        <!-- name -->
        <div class="field">
          <label class="field-label" for="guestName">Your name</label>
          <input type="text" id="guestName" name="guests" placeholder="who wanders here?" autocomplete="name" required />
        </div>

        <!-- attendance -->
        <div class="field">
          <label class="field-label" for="attendance">Will you be joining us?</label>
          <select id="attendance" name="attendance" required>
            <option value="">the forest awaits your answer…</option>
            <option value="yes">Yes, with joy</option>
            <option value="no">Regretfully, no</option>
          </select>
          <p class="reaction" id="reaction" aria-live="polite"></p>
        </div>

        <!-- YES FIELDS -->
        <div id="yesFields" class="field hidden">

          <!-- plus one -->
          <div class="field">
            <label class="field-label" for="plusOne">Bringing a plus one?</label>
            <select id="plusOne" name="plus_one">
              <option value="">Select</option>
              <option value="no">Just me</option>
              <option value="yes">Yes, bringing someone</option>
            </select>
          </div>

          <!-- plus one name -->
          <div class="field hidden" id="plusOneNameWrap">
            <label class="field-label" for="plusOneName">Plus one's name</label>
            <input type="text" id="plusOneName" name="plus_one_name" placeholder="who travels beside you?" autocomplete="off" />
          </div>

          <!-- kids -->
          <div class="field">
            <label class="field-label" for="kidsCount">Little ones attending <span style="font-size:0.72rem;opacity:0.65;">(max 6)</span></label>
            <input type="number" id="kidsCount" name="children" min="0" max="6" value="0" />
          </div>

          <!-- setup help -->
          <div class="field">
            <label class="field-label" for="setupHelp">Willing to help us set up?</label>
            <select id="setupHelp" name="setup_help">
              <option value="">Select</option>
              <option value="no">No, I'll just show up</option>
              <option value="yes">Yes, put me to work!</option>
            </select>
          </div>

          <!-- setup checklist -->
          <div class="field hidden" id="setupCheckWrap">
            <label class="field-label" style="margin-bottom:10px;">What can you help with?</label>
            <div class="checklist">
              <div class="check-item">
                <input type="checkbox" id="s1" name="setup[]" value="ice-pickup">
                <label for="s1">Ice pickup & refilling</label>
              </div>
              <div class="check-item">
                <input type="checkbox" id="s2" name="setup[]" value="food-pickup">
                <label for="s2">Food pickup</label>
              </div>
              <div class="check-item">
                <input type="checkbox" id="s3" name="setup[]" value="ceremony-chairs">
                <label for="s3">Ceremony chairs setup</label>
              </div>
              <div class="check-item">
                <input type="checkbox" id="s4" name="setup[]" value="pavilion-1b">
                <label for="s4">Pavilion 1B setup</label>
              </div>
              <div class="check-item">
                <input type="checkbox" id="s5" name="setup[]" value="cornhole">
                <label for="s5">Cornhole setup</label>
              </div>
              <div class="check-item">
                <input type="checkbox" id="s6" name="setup[]" value="decorating">
                <label for="s6">Decorating</label>
              </div>
              <div class="check-item">
                <input type="checkbox" id="s7" name="setup[]" value="hanging-decor">
                <label for="s7">Hanging decorations</label>
              </div>
              <div class="check-item">
                <input type="checkbox" id="s8" name="setup[]" value="cleanup">
                <label for="s8">Cleanup & breakdown</label>
              </div>
            </div>
          </div>

          <!-- alcohol -->
          <div class="field hidden" id="alcoholWrap">
            <label class="field-label" for="alcohol">Interested in contributing alcohol?</label>
            <select id="alcohol" name="alcohol_contribution">
              <option value="">Select</option>
              <option value="yes">Yes — Emily will be in touch</option>
              <option value="no">No thanks</option>
            </select>
          </div>

        </div><!-- /yesFields -->

        <!-- contact -->
        <div class="field">
          <label class="field-label" for="contact">How to reach you</label>
          <input type="text" id="contact" name="contact" placeholder="email or phone number" autocomplete="email" />
        </div>

        <!-- submit -->
        <button type="submit" class="submit-btn" id="submitBtn">
          <span class="btn-text" id="btnText">Present Yourself</span>
          <span class="btn-loader" id="btnLoader" aria-hidden="true">
            <span class="dot-pulse"></span>
            <span class="dot-pulse"></span>
            <span class="dot-pulse"></span>
          </span>
        </button>

      </form>

      <!-- response -->
      <div class="response hidden" id="responseBox" aria-live="polite">
        <p class="resp-title" id="respTitle">Your name has been recorded.</p>
        <p class="resp-sub"   id="respSub"></p>
        <p class="resp-note">The forest will send word when the time draws near.</p>
        <button class="edit-btn" id="editBtn" type="button">Need to change something?</button>
      </div>

      <!-- spark burst -->
      <div class="spark-burst" id="sparkBurst" aria-hidden="true"></div>

      <!-- bottom vine -->
      <div class="vine" style="margin-top:1.4rem;" aria-hidden="true">
        <svg viewBox="0 0 180 14" fill="none">
          <line x1="0" y1="7" x2="68" y2="7" stroke="#b8922e" stroke-width="0.7" opacity="0.6"/>
          <circle cx="76" cy="7" r="2.5" fill="#b8922e" opacity="0.65"/>
          <circle cx="90" cy="7" r="4" fill="#d4aa50" opacity="0.85"/>
          <circle cx="104" cy="7" r="2.5" fill="#b8922e" opacity="0.65"/>
          <line x1="112" y1="7" x2="180" y2="7" stroke="#b8922e" stroke-width="0.7" opacity="0.6"/>
        </svg>
      </div>

    </div><!-- /form-wrap -->
  </div><!-- /forest -->

  <!-- popup -->
  <div id="popup" class="popup-overlay" role="dialog" aria-modal="true">
    <div class="popup-box">
      <p id="popupMsg"></p>
      <button class="popup-close" type="button" onclick="closePopup()">understood</button>
    </div>
  </div>

  <script>
  (function() {
    'use strict';

    const ATTENDANCE_KEY = 'guestAttendance';

    const forest      = document.getElementById('forest');
    const firefliesEl = document.getElementById('fireflies');
    const loadScreen  = document.getElementById('loadingScreen');
    const form        = document.getElementById('rsvpForm');
    const formWrap    = document.getElementById('formWrap');
    const responseBox = document.getElementById('responseBox');
    const respTitle   = document.getElementById('respTitle');
    const respSub     = document.getElementById('respSub');
    const submitBtn   = document.getElementById('submitBtn');
    const btnText     = document.getElementById('btnText');
    const btnLoader   = document.getElementById('btnLoader');
    const sparkBurst  = document.getElementById('sparkBurst');
    const reaction    = document.getElementById('reaction');

    const attendance      = document.getElementById('attendance');
    const yesFields       = document.getElementById('yesFields');
    const plusOne         = document.getElementById('plusOne');
    const plusOneNameWrap = document.getElementById('plusOneNameWrap');
    const plusOneName     = document.getElementById('plusOneName');
    const setupHelp       = document.getElementById('setupHelp');
    const setupCheckWrap  = document.getElementById('setupCheckWrap');
    const alcoholWrap     = document.getElementById('alcoholWrap');

    const isMobile  = window.matchMedia('(hover:none)').matches;
    const isReduced = window.matchMedia('(prefers-reduced-motion:reduce)').matches;

    setTimeout(() => loadScreen.classList.add('done'), 200);

    // fireflies
    const COLORS = ['color-yellowgreen','color-amber','color-gold','color-warmwhite'];
    function makeFireflies() {
      firefliesEl.innerHTML = '';
      const count = isMobile ? 12 : 22;
      const riseN = Math.floor(count * 0.18);
      const frag  = document.createDocumentFragment();
      for (let i = 0; i < count; i++) {
        const dot = document.createElement('span');
        dot.className = 'firefly ' + COLORS[i % COLORS.length];
        if (i < riseN) {
          dot.classList.add('rise');
          dot.style.left   = (Math.random()*90+5).toFixed(1)+'%';
          dot.style.bottom = (-4+Math.random()*8).toFixed(1)+'%';
          dot.style.top    = 'auto';
          dot.style.setProperty('--rx', (Math.random()*60-30).toFixed(0)+'px');
        } else {
          dot.style.left = (Math.random()*97).toFixed(1)+'%';
          dot.style.top  = (Math.random()*92).toFixed(1)+'%';
        }
        const size = (Math.random()*(isMobile?3:3.5)+(isMobile?3.5:2.5)).toFixed(1);
        dot.style.width  = size+'px';
        dot.style.height = size+'px';
        dot.style.animationDuration = (Math.random()*10+10).toFixed(1)+'s,'+(Math.random()*5+4).toFixed(1)+'s';
        dot.style.animationDelay    = (Math.random()*8).toFixed(2)+'s,'+(Math.random()*5).toFixed(2)+'s';
        frag.appendChild(dot);
      }
      firefliesEl.appendChild(frag);
    }
    makeFireflies();
    window.addEventListener('resize', () => makeFireflies());

    // popup
    function showPopup(msg) {
      document.getElementById('popupMsg').textContent = msg;
      document.getElementById('popup').classList.add('show');
    }
    window.closePopup = () => document.getElementById('popup').classList.remove('show');

    // attendance
    attendance.addEventListener('change', () => {
      const val = attendance.value;
      yesFields.classList.toggle('hidden', val !== 'yes');

      reaction.textContent = '';
      reaction.className = 'reaction';
      forest.classList.remove('mood-yes','mood-no');

      if (val === 'yes') {
        reaction.textContent = 'the forest brightens at your answer';
        reaction.classList.add('show');
        forest.classList.add('mood-yes');
        if (!isReduced) sparkBurst_fire('yes');
      } else if (val === 'no') {
        reaction.textContent = "you'll be missed in the forest";
        reaction.classList.add('show','no');
        forest.classList.add('mood-no');
        if (!isReduced) sparkBurst_fire('no');
      }
    });

    // plus one
    plusOne.addEventListener('change', () => {
      const show = plusOne.value === 'yes' && attendance.value === 'yes';
      plusOneNameWrap.classList.toggle('hidden', !show);
      plusOneName.required = show;
    });

    // setup help
    setupHelp.addEventListener('change', () => {
      const show = setupHelp.value === 'yes';
      setupCheckWrap.classList.toggle('hidden', !show);
      alcoholWrap.classList.toggle('hidden', !show);
    });

    // sparks
    function sparkBurst_fire(type) {
      sparkBurst.innerHTML = '';
      if (type === 'yes') {
        for (let i = 0; i < 16; i++) {
          const s = document.createElement('span');
          s.className = 'spark ' + ['orange','gold','plum'][i%3];
          s.style.left = (44+Math.random()*12)+'%';
          s.style.top  = '40%';
          s.style.setProperty('--tx', (Math.random()*160-80).toFixed(0)+'px');
          s.style.setProperty('--ty', (-20-Math.random()*80).toFixed(0)+'px');
          s.style.animationDelay = (Math.random()*0.14)+'s';
          sparkBurst.appendChild(s);
        }
      } else {
        for (let i = 0; i < 8; i++) {
          const l = document.createElement('span');
          l.className = 'leaf ' + (i%2===0 ? 'dark' : 'plum');
          l.style.left = (44+Math.random()*18)+'%';
          l.style.top  = '30%';
          l.style.setProperty('--leafX', (Math.random()*44-22).toFixed(0)+'px');
          l.style.animationDelay = (Math.random()*0.25)+'s';
          sparkBurst.appendChild(l);
        }
      }
      setTimeout(() => sparkBurst.innerHTML = '', 2700);
    }

    // validation
    function validContact(v) {
      return /^\+?[\d\s\-().]{10,}$/.test(v) || /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
    }

    // submit
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const nameVal    = document.getElementById('guestName').value.trim();
      const attendVal  = attendance.value;
      const contactVal = document.getElementById('contact').value.trim();

      if (!nameVal) { showPopup('The forest needs your name.'); return; }
      if (!attendVal) { showPopup('The forest awaits your answer. Will you be joining us?'); return; }
      if (!validContact(contactVal)) { showPopup('Please leave an email or phone number so Emily can reach you.'); return; }
      if (attendVal === 'yes' && plusOne.value === 'yes' && !plusOneName.value.trim()) {
        showPopup("Please share your plus one's name so the forest can welcome them too."); return;
      }

      // kids validation
      const kidsVal = parseInt(document.getElementById('kidsCount').value) || 0;
      if (kidsVal > 6) { showPopup("Max 6 little ones — max 6 little ones allowed"); return; }

      submitBtn.disabled = true;
      btnText.classList.add('hidden');
      btnLoader.classList.add('active');

      const formData = new FormData(form);

      try {
        const res = await fetch(form.action, {
          method: 'POST',
          body: formData,
          headers: { Accept: 'application/json' }
        });

        if (!res.ok) {
          submitBtn.disabled = false;
          btnText.classList.remove('hidden');
          btnLoader.classList.remove('active');
          showPopup('Something went wrong. Please try again.');
          return;
        }

        // success
        sessionStorage.setItem(ATTENDANCE_KEY, attendVal);

        form.classList.add('hidden');
        responseBox.classList.remove('hidden');
        setTimeout(() => responseBox.classList.add('show'), 50);

        const first = nameVal.split(' ')[0];
        const cap   = first.charAt(0).toUpperCase() + first.slice(1).toLowerCase();

        if (attendVal === 'yes') {
          respTitle.textContent = cap + ', your name has been recorded.';
          respSub.textContent   = 'Emily and Travis are so glad you\'re coming. Keep an eye out for your code!';
        } else {
          respTitle.textContent = cap + ', you\'ll be missed.';
          respSub.textContent   = 'Even from afar, you remain part of the story.';
        }

      } catch(err) {
        submitBtn.disabled = false;
        btnText.classList.remove('hidden');
        btnLoader.classList.remove('active');
        showPopup('A network error occurred. Please try again.');
      }
    });

    // edit
    document.getElementById('editBtn').addEventListener('click', () => {
      responseBox.classList.remove('show');
      setTimeout(() => {
        responseBox.classList.add('hidden');
        form.classList.remove('hidden');
        submitBtn.disabled = false;
        btnText.classList.remove('hidden');
        btnLoader.classList.remove('active');
        attendance.value = '';
        yesFields.classList.add('hidden');
        reaction.className = 'reaction';
        forest.classList.remove('mood-yes','mood-no');
      }, 400);
    });

  })();
  </script>

</body>
</html>
