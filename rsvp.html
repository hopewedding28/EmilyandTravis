<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emily & Travis — RSVP</title>

  <link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light+Two&family=Zen+Loop&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Zen Loop', sans-serif;
      background: #0a0a0a;
      color: #e8e1c7;
    }

    .forest {
      min-height: 100vh;
      background: url("assets/assets/backgrounds/insidegate.png") center / cover no-repeat;
      position: relative;
      padding: 5rem 1.5rem;
    }

    .forest::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center,
        rgba(10,10,10,0.25) 0%,
        rgba(10,10,10,0.45) 60%,
        rgba(10,10,10,0.6) 100%);
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      max-width: 680px;
      margin: 0 auto;
    }

    h1 {
      font-family: 'Shadows Into Light Two', cursive;
      color: #f3d37a;
      font-size: 3rem;
      text-align: center;
      margin-bottom: 2rem;
      text-shadow: 0 0 18px rgba(243,211,122,0.6);
    }

    label { display: block; margin-top: 1.5rem; margin-bottom: 0.4rem; }

    input, select {
      width: 100%;
      padding: 0.75rem;
      border-radius: 6px;
      border: none;
      font-size: 1rem;
    }

    .checkbox-group label {
      display: block;
      margin: 0.3rem 0;
    }

    button {
      margin-top: 2rem;
      width: 100%;
      padding: 0.9rem;
      background: #f3d37a;
      color: #0a0a0a;
      border: none;
      border-radius: 6px;
      font-size: 1.1rem;
      cursor: pointer;
    }

    .hidden { display: none; }

    .response {
      margin-top: 2.5rem;
      padding: 2rem;
      background: rgba(10,10,10,0.6);
      border-radius: 8px;
      text-align: center;
    }

    .registry-btn {
      display: inline-block;
      margin-top: 0.8rem;
      padding: 0.7rem 1.4rem;
      background: #f3d37a;
      color: #0a0a0a;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .popup-box {
      background: #111;
      padding: 1.5rem;
      border-radius: 8px;
      text-align: center;
      max-width: 300px;
    }

    .popup-box button {
      margin-top: 1rem;
      width: auto;
      padding: 0.5rem 1.2rem;
    }
  </style>
</head>

<body>

<div class="forest">
  <div class="content">

    <h1>RSVP</h1>

    <form id="rsvpForm" action="https://formspree.io/f/xqewzpgo" method="POST">

      <label>Guest name(s)</label>
      <input type="text" name="guests" required>

      <label>Will you be joining us?</label>
      <select id="attendance" name="attendance" required>
        <option value="">Select</option>
        <option value="yes">Yes, with joy</option>
        <option value="no">Regretfully, no</option>
      </select>

      <div id="yesFields" class="hidden">

        <label>Plus one?</label>
        <select id="plusOne">
          <option value="">Select</option>
          <option value="no">No</option>
          <option value="yes">Yes</option>
        </select>

        <div id="plusOneNameWrap" class="hidden">
          <label>Plus one name</label>
          <input type="text" id="plusOneName" name="plus_one_name">
        </div>

        <label>Number of children attending</label>
        <input type="number" name="children" min="0" max="6" value="0">

        <label>Dietary restrictions</label>
        <div class="checkbox-group">
          <label><input type="checkbox" name="dietary[]" value="vegetarian"> Vegetarian</label>
          <label><input type="checkbox" name="dietary[]" value="vegan"> Vegan</label>
          <label><input type="checkbox" name="dietary[]" value="gluten-free"> Gluten-free</label>
          <label><input type="checkbox" name="dietary[]" value="dairy-free"> Dairy-free</label>
        </div>

      </div>

      <label>Contact (email or phone)</label>
      <input id="contactField" name="contact" type="text"
             placeholder="Required if attending — optional if not">

      <button id="submitBtn" type="submit">Send RSVP</button>
    </form>

    <div id="responseBox" class="response hidden">
      <p>Your RSVP has been received.</p>
      <p id="responseText"></p>

      <p style="margin-top:1rem;">
        The forest will reach out when your path is ready. You’ll receive your forest code soon.
      </p>
    </div>

  </div>
</div>

<div id="popup" class="popup-overlay hidden">
  <div class="popup-box">
    <p id="popupMessage"></p>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<script>
const attendance = document.getElementById("attendance");
const yesFields = document.getElementById("yesFields");
const plusOne = document.getElementById("plusOne");
const plusOneNameWrap = document.getElementById("plusOneNameWrap");
const plusOneName = document.getElementById("plusOneName");
const contactField = document.getElementById("contactField");
const form = document.getElementById("rsvpForm");
const responseBox = document.getElementById("responseBox");
const responseText = document.getElementById("responseText");
const submitBtn = document.getElementById("submitBtn");

function showPopup(msg) {
  document.getElementById("popupMessage").textContent = msg;
  document.getElementById("popup").classList.remove("hidden");
}
function closePopup() {
  document.getElementById("popup").classList.add("hidden");
}

attendance.addEventListener("change", () => {
  const yes = attendance.value === "yes";
  yesFields.classList.toggle("hidden", !yes);
  contactField.required = yes;
});

plusOne.addEventListener("change", () => {
  const yes = plusOne.value === "yes";
  plusOneNameWrap.classList.toggle("hidden", !yes);
  plusOneName.required = yes;
});

function isValidContact(val) {
  const phone = /^\d{10}$/;
  const email = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  return phone.test(val) || email.test(val);
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  // ✅ FIX: prevent ghost triggers
  if (!e.isTrusted) return;

  if (attendance.value !== "yes" && attendance.value !== "no") {
    showPopup("Please select whether you will be attending.");
    return;
  }

  const contact = contactField.value.trim();

  if (attendance.value === "yes") {
    if (!isValidContact(contact)) {
      showPopup("Please enter a valid phone or email so we can reach you.");
      return;
    }
    if (plusOne.value === "yes" && plusOneName.value.trim() === "") {
      showPopup("Please enter your plus one’s name so we can include them.");
      return;
    }
  }

  submitBtn.textContent = "Sending...";
  submitBtn.disabled = true;

  const formData = new FormData(form);

  try {
    const res = await fetch(form.action, {
      method: "POST",
      body: formData,
      headers: { Accept: "application/json" }
    });

    if (res.ok) {
      form.classList.add("hidden");
      responseBox.classList.remove("hidden");

      if (attendance.value === "yes") {
        responseText.textContent = "We’re excited to have you there.";
      } else {
        responseText.textContent = "We’ll miss you, but we understand.";
      }
    } else {
      showPopup("RSVP failed. Please try again.");
    }
  } catch {
    showPopup("Network error. Please try again.");
  }
});
</script>

</body>
</html>
