<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Emily & Travis — RSVP</title>

<link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light+Two&family=Zen+Loop&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Zen Loop', sans-serif;
  background: #0a0a0a;
  color: #e8e1c7;
}

.forest {
  min-height: 100vh;
  background: url("assets/backgrounds/inside-gate.png") center / cover no-repeat;
  position: relative;
  padding: 5rem 1.5rem;
}

.forest::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center,
    rgba(10,10,10,0.25) 0%,
    rgba(10,10,10,0.45) 60%,
    rgba(10,10,10,0.6) 100%);
  z-index: 1;
}

.content {
  position: relative;
  z-index: 2;
  max-width: 680px;
  margin: 0 auto;
}

h1 {
  font-family: 'Shadows Into Light Two', cursive;
  color: #f3d37a;
  font-size: 3rem;
  text-align: center;
  margin-bottom: 2rem;
}

label { display: block; margin-top: 1.5rem; }

input, select {
  width: 100%;
  padding: 0.75rem;
  border-radius: 6px;
  border: none;
}

button {
  margin-top: 2rem;
  width: 100%;
  padding: 0.9rem;
  background: #f3d37a;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.hidden { display: none; }

.response {
  margin-top: 2rem;
  padding: 2rem;
  background: rgba(0,0,0,0.6);
  border-radius: 8px;
  text-align: center;
}

.registry-btn {
  display: inline-block;
  margin-top: 1rem;
  padding: 0.7rem 1.4rem;
  background: #f3d37a;
  color: #000;
  text-decoration: none;
  border-radius: 6px;
}

/* popup */
.popup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
}

.popup-box {
  background: #111;
  padding: 1.5rem;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="forest">
<div class="content">

<h1>RSVP</h1>

<form id="rsvpForm" action="https://formspree.io/f/xqewzpgo" method="POST">

<label>Guest name(s)</label>
<input type="text" name="guests" required>

<label>Will you be joining us?</label>
<select id="attendance" name="attendance" required>
<option value="">Select</option>
<option value="yes">Yes, with joy</option>
<option value="no">Regretfully, no</option>
</select>

<div id="yesFields" class="hidden">

<label>Plus one?</label>
<select id="plusOne">
<option value="">Select</option>
<option value="no">No</option>
<option value="yes">Yes</option>
</select>

<div id="plusOneNameWrap" class="hidden">
<label>Plus one name</label>
<input type="text" id="plusOneName" name="plus_one_name">
</div>

<label>Children attending</label>
<input type="number" name="children" min="0" value="0">

</div>

<label>Contact (email or phone)</label>
<input id="contactField" name="contact" type="text">

<button type="submit">Send RSVP</button>

</form>

<div id="responseBox" class="response hidden">
<p>Your RSVP has been received.</p>
<p id="responseText"></p>

<p>The forest will reach out when your path is ready. You’ll receive your forest code soon.</p>

<div>
<p>Have a forest code?</p>
<input id="forestCodeInput">
<button id="forestCodeButton">Enter</button>
<p id="codeMessage"></p>
</div>

<div id="registryWrapper" class="hidden">
<p>Still want to send a little love?</p>
<a href="registry.html" class="registry-btn">Visit the Registry</a>
</div>

<p id="editResponse" style="cursor:pointer;">Need to update your response?</p>
</div>

</div>
</div>

<!-- popup -->
<div id="popup" class="popup-overlay">
<div class="popup-box">
<p id="popupMessage"></p>
<button onclick="closePopup()">OK</button>
</div>
</div>

<script>
// ELEMENTS
const attendance = document.getElementById("attendance");
const yesFields = document.getElementById("yesFields");
const plusOne = document.getElementById("plusOne");
const plusOneNameWrap = document.getElementById("plusOneNameWrap");
const plusOneName = document.getElementById("plusOneName");
const contactField = document.getElementById("contactField");
const form = document.getElementById("rsvpForm");
const responseBox = document.getElementById("responseBox");
const responseText = document.getElementById("responseText");
const registryWrapper = document.getElementById("registryWrapper");

// POPUP
function showPopup(msg) {
  document.getElementById("popupMessage").textContent = msg;
  document.getElementById("popup").style.display = "flex";
}
function closePopup() {
  document.getElementById("popup").style.display = "none";
}

// CONDITIONAL
attendance.addEventListener("change", () => {
  yesFields.classList.toggle("hidden", attendance.value !== "yes");
});

plusOne.addEventListener("change", () => {
  plusOneNameWrap.classList.toggle("hidden", plusOne.value !== "yes");
});

// VALIDATION
function isValidContact(val) {
  const phone = /^\d{10}$/;
  const email = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  return phone.test(val) || email.test(val);
}

// SUBMIT
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  if (attendance.value === "") {
    showPopup("Please select if you're attending.");
    return;
  }

  if (attendance.value === "yes") {
    if (!isValidContact(contactField.value.trim())) {
      showPopup("Enter a valid phone or email.");
      return;
    }
    if (plusOne.value === "yes" && plusOneName.value.trim() === "") {
      showPopup("Enter your plus one’s name.");
      return;
    }
  }

  const formData = new FormData(form);

  try {
    const res = await fetch(form.action, {
      method: "POST",
      body: formData,
      headers: { Accept: "application/json" }
    });

    if (res.ok) {
      form.classList.add("hidden");
      responseBox.classList.remove("hidden");

      if (attendance.value === "yes") {
        responseText.textContent = "We’re excited to have you there.";
      } else {
        responseText.textContent = "We’ll miss you, but we understand.";
        registryWrapper.classList.remove("hidden");
      }
    } else {
      showPopup("Submission failed.");
    }
  } catch {
    showPopup("Network error.");
  }
});

// FOREST CODE SYSTEM (WITH MEMORY)
const VALID_CODES = {
  "TACOSTESTCODE": "Taco Test"
};

const codeInput = document.getElementById("forestCodeInput");
const codeButton = document.getElementById("forestCodeButton");
const codeMessage = document.getElementById("codeMessage");

let attempts = 0;

const messages = [
  "That’s not the code.",
  "Try again.",
  "Are you sure you were invited?",
  "Bestie… check your texts.",
  "Girl… be serious right now."
];

codeButton.addEventListener("click", () => {
  const entered = codeInput.value.trim().toUpperCase();

  if (VALID_CODES[entered]) {

    // 🌲 SAVE SESSION MEMORY
    sessionStorage.setItem("rsvpAccess", "true");
    sessionStorage.setItem("guestName", VALID_CODES[entered]);

    window.location.href = "landing.html";
    return;
  }

  attempts++;
  codeMessage.textContent =
    messages[Math.min(attempts - 1, messages.length - 1)];
});

// EDIT
document.getElementById("editResponse").addEventListener("click", () => {
  responseBox.classList.add("hidden");
  form.classList.remove("hidden");
});
</script>

</body>
</html>
