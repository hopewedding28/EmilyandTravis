<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#060b06" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>Emily &amp; Travis</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Loop&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #060b06;
      font-family: 'Zen Loop', sans-serif;
    }

    .gate-page {
      position: relative;
      width: 100%; height: 100vh;
      background: url("assets/backgrounds/transition.png") center / cover no-repeat;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: clamp(2rem, 8vh, 5rem);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .gate-page::before {
      content: "";
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center,
        rgba(6,6,6,0.08) 0%,
        rgba(6,6,6,0.35) 55%,
        rgba(6,6,6,0.72) 100%
      );
      z-index: 1; pointer-events: none;
      transition: background 0.5s ease;
    }

    .gate-page.entering::before {
      background: rgba(243,220,160,0.35);
    }

    .overlay-breathe {
      position: absolute; inset: 0; z-index: 2;
      background: radial-gradient(ellipse at center, transparent 35%, rgba(4,8,4,0.14) 100%);
      pointer-events: none;
      animation: breathePulse 10s ease-in-out infinite;
    }
    @keyframes breathePulse { 0%,100%{opacity:.5} 50%{opacity:1} }

    .overlay-glow {
      position: absolute; inset: 0; z-index: 2;
      background: radial-gradient(ellipse at 50% 42%, rgba(243,211,122,0.07) 0%, transparent 55%);
      pointer-events: none;
      animation: glowShift 16s ease-in-out infinite alternate;
    }
    @keyframes glowShift { 0%{opacity:.5} 100%{opacity:1} }

    .mist-layer {
      position: absolute; inset: auto 0 0 0;
      height: 28vh; z-index: 3;
      background:
        radial-gradient(ellipse at 25% 100%, rgba(255,255,255,0.024), transparent 38%),
        radial-gradient(ellipse at 50% 100%, rgba(255,255,255,0.036), transparent 44%),
        radial-gradient(ellipse at 75% 100%, rgba(255,255,255,0.026), transparent 40%);
      filter: blur(20px); opacity: 0.85; pointer-events: none;
      animation: mistDrift 24s ease-in-out infinite alternate;
    }
    @keyframes mistDrift {
      0%  { transform: translateX(-1.5%) translateY(0);   opacity: .65; }
      100%{ transform: translateX(1.5%)  translateY(-1%); opacity: .92; }
    }

    .fireflies { position: absolute; inset: 0; z-index: 4; pointer-events: none; overflow: hidden; }
    .firefly {
      position: absolute; border-radius: 50%; opacity: 0;
      animation-name: driftFloat, flickerGlow;
      animation-timing-function: linear, ease-in-out;
      animation-iteration-count: infinite;
      will-change: transform, opacity;
    }
    .firefly.color-gold {
      background: radial-gradient(circle, rgba(255,240,140,.98) 0%, rgba(243,211,122,.55) 48%, transparent 100%);
      box-shadow: 0 0 8px rgba(243,220,120,.65), 0 0 20px rgba(230,200,100,.28);
    }
    .firefly.color-amber {
      background: radial-gradient(circle, rgba(255,180,60,.98) 0%, rgba(240,150,30,.55) 48%, transparent 100%);
      box-shadow: 0 0 8px rgba(255,170,50,.65), 0 0 20px rgba(240,140,20,.28);
    }
    .firefly.color-warmwhite {
      background: radial-gradient(circle, rgba(255,252,230,.98) 0%, rgba(255,245,200,.55) 48%, transparent 100%);
      box-shadow: 0 0 8px rgba(255,248,220,.65), 0 0 20px rgba(255,240,190,.28);
    }
    .firefly.rise { animation-name: driftRise, flickerGlow; }

    @keyframes driftFloat {
      0%  { transform: translate3d(0,0,0) scale(.88); }
      20% { transform: translate3d(16px,-24px,0) scale(1.06); }
      40% { transform: translate3d(-11px,-40px,0) scale(.94); }
      60% { transform: translate3d(14px,-28px,0) scale(1.10); }
      80% { transform: translate3d(-8px,-14px,0) scale(.96); }
      100%{ transform: translate3d(-5px,0,0) scale(.90); }
    }
    @keyframes driftRise {
      0%  { transform: translate3d(0,0,0) scale(.7); opacity:0; }
      8%  { opacity:.7; }
      100%{ transform: translate3d(var(--rx,20px),-130px,0) scale(1.1); opacity:0; }
    }
    @keyframes flickerGlow {
      0%,100%{opacity:.04} 10%{opacity:.65} 26%{opacity:.10}
      48%{opacity:.78} 66%{opacity:.16} 82%{opacity:.52}
    }

    /* prompt */
    .prompt-wrap {
      position: relative; z-index: 6;
      text-align: center;
      opacity: 0;
      animation: riseIn 900ms cubic-bezier(.25,.8,.25,1) forwards;
      animation-delay: 1600ms;
      pointer-events: none;
    }
    .prompt-text {
      font-size: clamp(.72rem, 1.4vw, .88rem);
      color: rgba(240,234,214,.60);
      letter-spacing: .24em;
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(0,0,0,.95), 0 1px 8px rgba(0,0,0,.90);
      animation: gentlePulse 3s ease-in-out infinite;
      animation-delay: 2600ms;
    }
    @keyframes gentlePulse { 0%,100%{opacity:.55} 50%{opacity:1} }

    .loading-screen {
      position: fixed; inset: 0; background: #060b06;
      z-index: 100; pointer-events: none;
      transition: opacity 1s cubic-bezier(.25,.8,.25,1);
    }
    .loading-screen.done { opacity: 0; }

    .gate-page.leaving {
      animation: pageLeave .8s ease forwards;
    }
    @keyframes pageLeave {
      0%  { opacity:1; filter:brightness(1.0); }
      60% { opacity:1; filter:brightness(1.6); }
      100%{ opacity:0; filter:brightness(2.2); }
    }

    @keyframes riseIn {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .overlay-breathe,.overlay-glow,.mist-layer { animation:none; }
      .firefly { display:none; }
      .prompt-wrap { animation:none; opacity:1; }
      .prompt-text { animation:none; opacity:.7; }
      .loading-screen { display:none; }
    }
  </style>
</head>
<body>

  <div class="loading-screen" id="loadingScreen" aria-hidden="true"></div>

  <div class="gate-page" id="gatePage" role="button" aria-label="Tap to enter" tabindex="0">
    <div class="overlay-breathe" aria-hidden="true"></div>
    <div class="overlay-glow"    aria-hidden="true"></div>
    <div class="mist-layer"      aria-hidden="true"></div>
    <div class="fireflies" id="fireflies" aria-hidden="true"></div>

    <div class="prompt-wrap">
      <p class="prompt-text">tap to enter</p>
    </div>
  </div>

  <script>
  (function() {
    'use strict';

    const ACCESS_KEY = 'rsvpAccess';
    const URL_RSVP   = 'rsvp.html';
    const URL_HOME   = 'home.html';

    const gatePage      = document.getElementById('gatePage');
    const loadingScreen = document.getElementById('loadingScreen');
    const isMobile      = window.matchMedia('(hover:none)').matches;

    setTimeout(() => loadingScreen.classList.add('done'), 200);

    // fireflies
    const wrap   = document.getElementById('fireflies');
    const colors = ['color-gold','color-amber','color-warmwhite'];
    const count  = isMobile ? 14 : 24;
    const riseN  = Math.floor(count * 0.18);
    const frag   = document.createDocumentFragment();

    for (let i = 0; i < count; i++) {
      const dot = document.createElement('span');
      dot.className = 'firefly ' + colors[i % colors.length];
      if (i < riseN) {
        dot.classList.add('rise');
        dot.style.left   = (Math.random()*90+5).toFixed(1)+'%';
        dot.style.bottom = (-4+Math.random()*10).toFixed(1)+'%';
        dot.style.top    = 'auto';
        dot.style.setProperty('--rx', (Math.random()*60-30).toFixed(0)+'px');
      } else {
        dot.style.left = (Math.random()*97).toFixed(1)+'%';
        dot.style.top  = (Math.random()*90).toFixed(1)+'%';
      }
      const size = (Math.random()*(isMobile?3:3.5)+(isMobile?3.5:2.5)).toFixed(1);
      dot.style.width  = size+'px';
      dot.style.height = size+'px';
      dot.style.animationDuration = (Math.random()*10+10).toFixed(1)+'s, '+(Math.random()*5+4).toFixed(1)+'s';
      dot.style.animationDelay    = (Math.random()*8).toFixed(2)+'s, '+(Math.random()*5).toFixed(2)+'s';
      frag.appendChild(dot);
    }
    wrap.appendChild(frag);

    // destination — returning guest goes home, new guest goes to RSVP
    const access  = localStorage.getItem(ACCESS_KEY);
    const destUrl = access === 'true' ? URL_HOME : URL_RSVP;

    function enterGate() {
      if (gatePage.classList.contains('entering')) return;
      gatePage.classList.add('entering');
      setTimeout(() => gatePage.classList.add('leaving'), 300);
      setTimeout(() => { window.location.href = destUrl; }, 1000);
    }

    gatePage.addEventListener('click', enterGate);
    gatePage.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') enterGate();
    });

  })();
  </script>

</body>
</html>
