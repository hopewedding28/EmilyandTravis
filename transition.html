<!DOCTYPE html>
<html lang="en">
<head>

  <!-- ============================================================
       EMILY & TRAVIS WEDDING SITE
       FILE: transition.html
       PURPOSE: The bridge. Guest just stepped through the gate.
                No buttons. No choices. Just the forest receiving them.
                Auto-redirects to rsvp.html (new) or landing.html (returning).
       BACKGROUND: inside-gate.png — warm golden clearing, open sky,
                   pond in the distance. You made it through.
  ============================================================ -->

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#060b06" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>Emily and Travis</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light+Two&family=Zen+Loop&display=swap" rel="stylesheet" />
  <link rel="preload" href="assets/backgrounds/inside-gate.png" as="image" />

  <style>

    /* ============================================================
       TABLE OF CONTENTS
       1.  CSS VARIABLES / TOKENS
       2.  RESET + BASE
       3.  HERO + BACKGROUND
       4.  OVERLAY SYSTEM
       5.  MIST LAYER
       6.  FIREFLY SYSTEM
       7.  SCENE CONTENT
       8.  GREETING TEXT
       9.  SUB TEXT
       10. SEPARATOR ORBS
       11. LOADING SCREEN
       12. PAGE LEAVE TRANSITION
       13. BRIGHTENING FLASH (3D — before redirect)
       14. FALLBACK BUTTON
       15. ANIMATIONS LIBRARY
       16. MOBILE / RESPONSIVE
       17. SAFE AREA INSETS
       18. REDUCED MOTION
    ============================================================ */


    /* ============================================================
       1. CSS VARIABLES / TOKENS
       Identical to index.html — site-wide consistency
    ============================================================ */
    :root {
      --gold:           #f3d37a;
      --gold-dim:       rgba(243, 211, 122, 0.55);
      --gold-soft:      rgba(243, 211, 122, 0.28);
      --gold-whisper:   rgba(243, 211, 122, 0.12);
      --mist:           rgba(248, 242, 224, 0.97);
      --mist-soft:      rgba(242, 235, 212, 0.92);
      --mist-faint:     rgba(240, 234, 214, 0.48);
      --forest-deep:    #060b06;
      --forest-mid:     #0c160d;

      --t-fast:         250ms;
      --t-base:         450ms;
      --t-slow:         700ms;

      --ease-soft:      cubic-bezier(0.25, 0.8, 0.25, 1);
      --ease-default:   cubic-bezier(0.4, 0, 0.2, 1);
      --ease-out:       cubic-bezier(0.0, 0, 0.2, 1);

      --sp-xs:  8px;
      --sp-sm:  16px;
      --sp-md:  24px;
      --sp-lg:  32px;
      --sp-xl:  48px;
    }


    /* ============================================================
       2. RESET + BASE
    ============================================================ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      width: 100%;
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--forest-deep);
      font-family: 'Zen Loop', sans-serif;
    }


    /* ============================================================
       3. HERO + BACKGROUND
       inside-gate.png — warm golden clearing beyond the gate.
       Brighter and more open than index.html's moody gate.
    ============================================================ */
    .hero {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      background: url("assets/backgrounds/inside-gate.png") center / cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      will-change: opacity, filter;
    }

    .hero.loaded {
      animation:
        heroFadeIn 1.4s var(--ease-soft) forwards,
        ambientPulse 14s ease-in-out 1.4s infinite alternate;
    }

    @keyframes heroFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes ambientPulse {
      from { filter: brightness(1.00); }
      to   { filter: brightness(1.04); }
    }

    /* leaving — fades to bright white light, like stepping forward */
    .hero.leaving {
      animation: heroLeave 0.9s var(--ease-default) forwards !important;
    }

    @keyframes heroLeave {
      0%   { opacity: 1; filter: brightness(1.0); }
      60%  { opacity: 1; filter: brightness(1.5); }
      100% { opacity: 0; filter: brightness(2.0); }
    }


    /* ============================================================
       4. OVERLAY SYSTEM
       inside-gate is brighter so overlay is lighter than index
    ============================================================ */
    .overlay-vignette {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: radial-gradient(
        ellipse at center,
        rgba(6, 6, 6, 0.10)  0%,
        rgba(6, 6, 6, 0.38)  55%,
        rgba(6, 6, 6, 0.72)  100%
      );
      pointer-events: none;
    }

    .overlay-breathe {
      position: absolute;
      inset: 0;
      z-index: 2;
      background: radial-gradient(
        ellipse at center,
        transparent 35%,
        rgba(4, 8, 4, 0.16) 100%
      );
      pointer-events: none;
      animation: breathePulse 10s ease-in-out infinite;
    }

    @keyframes breathePulse {
      0%,  100% { opacity: 0.5; }
      50%        { opacity: 1.0; }
    }

    /* warm golden center glow matching the light in inside-gate.png */
    .overlay-glow {
      position: absolute;
      inset: 0;
      z-index: 2;
      background: radial-gradient(
        ellipse at 50% 42%,
        rgba(243, 211, 122, 0.07) 0%,
        transparent 55%
      );
      pointer-events: none;
      animation: glowShift 16s ease-in-out infinite alternate;
    }

    @keyframes glowShift {
      0%   { opacity: 0.5; transform: scale(1.00); }
      100% { opacity: 1.0; transform: scale(1.06); }
    }

    /* brightening layer — triggered right before redirect (option 3D) */
    .overlay-brighten {
      position: absolute;
      inset: 0;
      z-index: 9;
      background: rgba(243, 220, 160, 0);
      pointer-events: none;
      transition: background 1.2s var(--ease-out);
    }

    .overlay-brighten.active {
      background: rgba(243, 220, 160, 0.22);
    }


    /* ============================================================
       5. MIST LAYER
    ============================================================ */
    .mist-layer {
      position: absolute;
      inset: auto 0 0 0;
      height: 28vh;
      z-index: 3;
      background:
        radial-gradient(ellipse at 25% 100%, rgba(255,255,255,0.024), transparent 38%),
        radial-gradient(ellipse at 50% 100%, rgba(255,255,255,0.036), transparent 44%),
        radial-gradient(ellipse at 75% 100%, rgba(255,255,255,0.026), transparent 40%);
      filter: blur(20px);
      opacity: 0.85;
      pointer-events: none;
      animation: mistDrift 24s ease-in-out infinite alternate;
    }

    @keyframes mistDrift {
      0%   { transform: translateX(-1.5%) translateY(0);   opacity: 0.65; }
      100% { transform: translateX(1.5%)  translateY(-1%); opacity: 0.92; }
    }


    /* ============================================================
       6. FIREFLY SYSTEM
       Consistent with index.html
    ============================================================ */
    .fireflies {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      overflow: hidden;
    }

    .firefly {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(255, 243, 194, 0.98)  0%,
        rgba(243, 211, 122, 0.55)  48%,
        rgba(243, 211, 122, 0.12)  72%,
        transparent                100%
      );
      box-shadow:
        0 0 8px  rgba(243, 211, 122, 0.52),
        0 0 18px rgba(243, 211, 122, 0.20);
      opacity: 0;
      animation-name: driftFloat, flickerGlow;
      animation-timing-function: linear, ease-in-out;
      animation-iteration-count: infinite, infinite;
      will-change: transform, opacity;
    }

    .firefly.rise {
      animation-name: driftRise, flickerGlow;
    }

    @keyframes driftFloat {
      0%   { transform: translate3d(0, 0, 0) scale(0.88); }
      20%  { transform: translate3d(16px, -24px, 0) scale(1.06); }
      40%  { transform: translate3d(-11px, -40px, 0) scale(0.94); }
      60%  { transform: translate3d(14px, -28px, 0) scale(1.10); }
      80%  { transform: translate3d(-8px, -14px, 0) scale(0.96); }
      100% { transform: translate3d(-5px, 0, 0) scale(0.90); }
    }

    @keyframes driftRise {
      0%   { transform: translate3d(0, 0, 0) scale(0.7); opacity: 0; }
      10%  { opacity: 0.6; }
      100% { transform: translate3d(var(--rx, 20px), -130px, 0) scale(1.1); opacity: 0; }
    }

    @keyframes flickerGlow {
      0%,  100% { opacity: 0.05; }
      12%        { opacity: 0.65; }
      28%        { opacity: 0.11; }
      50%        { opacity: 0.78; }
      68%        { opacity: 0.18; }
      84%        { opacity: 0.52; }
    }


    /* ============================================================
       7. SCENE CONTENT
    ============================================================ */
    .scene {
      position: relative;
      z-index: 6;
      text-align: center;
      max-width: 560px;
      width: 100%;
      padding: var(--sp-lg) var(--sp-md);
      opacity: 0;
      transition: opacity 0.9s var(--ease-soft);
    }

    .scene.visible {
      opacity: 1;
    }

    .scene.leaving {
      opacity: 0;
      transition: opacity 0.7s var(--ease-default);
    }


    /* ============================================================
       8. GREETING TEXT
    ============================================================ */
    .greeting {
      font-family: 'Shadows Into Light Two', cursive;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      color: var(--mist);
      line-height: 1.65;
      text-shadow:
        0 0  4px  rgba(0, 0, 0, 0.98),
        0 2px 10px rgba(0, 0, 0, 0.95),
        0 4px 24px rgba(0, 0, 0, 0.85),
        0 0  48px rgba(0, 0, 0, 0.60);
      opacity: 0;
      animation: riseIn 800ms var(--ease-soft) forwards;
      animation-delay: 1600ms;
    }


    /* ============================================================
       9. SUB TEXT
    ============================================================ */
    .sub {
      margin-top: var(--sp-sm);
      font-family: 'Zen Loop', sans-serif;
      font-size: clamp(0.85rem, 1.6vw, 0.98rem);
      color: var(--mist-soft);
      letter-spacing: 0.04em;
      line-height: 1.7;
      font-style: italic;
      text-shadow:
        0 0  4px  rgba(0, 0, 0, 0.98),
        0 1px 8px  rgba(0, 0, 0, 0.95),
        0 2px 20px rgba(0, 0, 0, 0.80);
      opacity: 0;
      animation: riseIn 700ms var(--ease-soft) forwards;
      animation-delay: 2200ms;
    }


    /* ============================================================
       10. SEPARATOR ORBS
       Three breathing gold orbs — replaces old basic dots
    ============================================================ */
    .orb-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      margin-top: var(--sp-lg);
      opacity: 0;
      animation: riseIn 700ms var(--ease-soft) forwards;
      animation-delay: 2800ms;
    }

    .orb {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(255, 243, 194, 0.96) 0%,
        rgba(243, 211, 122, 0.60) 50%,
        transparent 100%
      );
      box-shadow:
        0 0 8px  rgba(243, 211, 122, 0.65),
        0 0 18px rgba(243, 211, 122, 0.28);
      animation: orbFloat 2.4s ease-in-out infinite;
    }

    .orb:nth-child(1) { animation-delay: 0.0s; }
    .orb:nth-child(2) { animation-delay: 0.4s; width: 8px; height: 8px; }
    .orb:nth-child(3) { animation-delay: 0.8s; }

    @keyframes orbFloat {
      0%,  100% { transform: translateY(0)    scale(0.85); opacity: 0.45; }
      50%        { transform: translateY(-7px) scale(1.15); opacity: 1.00; }
    }


    /* ============================================================
       11. LOADING SCREEN
    ============================================================ */
    .loading-screen {
      position: fixed;
      inset: 0;
      background: var(--forest-deep);
      z-index: 100;
      pointer-events: none;
      transition: opacity 1.0s var(--ease-soft);
    }

    .loading-screen.done {
      opacity: 0;
    }


    /* ============================================================
       12. PAGE LEAVE TRANSITION
       Handled via JS — .leaving classes on scene + hero
    ============================================================ */


    /* ============================================================
       13. BRIGHTENING FLASH (option 3D)
       Subtle warm gold wash right before redirect fires.
       Feels like stepping toward the light.
       Defined above in overlay system as .overlay-brighten
    ============================================================ */


    /* ============================================================
       14. FALLBACK BUTTON
       Only appears after 6s if redirect somehow fails.
       Wispy style — matches index.html button.
    ============================================================ */
    .fallback-btn {
      display: inline-block;
      position: relative;
      margin-top: var(--sp-lg);
      padding: 0.75rem 2.8rem;
      font-family: 'Zen Loop', sans-serif;
      font-size: clamp(0.75rem, 1.4vw, 0.85rem);
      letter-spacing: 0.20em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--mist);
      text-shadow:
        0 0  4px  rgba(0, 0, 0, 1.0),
        0 1px 8px  rgba(0, 0, 0, 1.0);
      background: transparent;
      border: none;
      cursor: pointer;
      outline: none;
      opacity: 0;
      pointer-events: none;
      transition:
        opacity 600ms var(--ease-soft),
        color   400ms var(--ease-default);
      -webkit-tap-highlight-color: transparent;
    }

    .fallback-btn::before {
      content: "";
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
    }

    .fallback-btn::after {
      content: "";
      position: absolute;
      bottom: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
    }

    .fallback-btn.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .fallback-btn:hover { color: var(--gold); }


    /* ============================================================
       15. ANIMATIONS LIBRARY
    ============================================================ */
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInSoft {
      from { opacity: 0; }
      to   { opacity: 1; }
    }


    /* ============================================================
       16. MOBILE / RESPONSIVE
    ============================================================ */
    @media (max-width: 600px) {
      .scene {
        padding: var(--sp-md) var(--sp-sm);
      }

      .greeting {
        font-size: clamp(1.4rem, 7vw, 1.9rem);
      }

      .sub {
        font-size: 0.88rem;
      }

      .orb-row {
        gap: 1rem;
        margin-top: var(--sp-md);
      }
    }

    @media (max-width: 380px) {
      .greeting { font-size: clamp(1.2rem, 8vw, 1.6rem); }
      .sub      { font-size: 0.82rem; }
    }


    /* ============================================================
       17. SAFE AREA INSETS
    ============================================================ */
    .scene {
      padding-top:   max(var(--sp-lg), env(safe-area-inset-top));
      padding-left:  max(var(--sp-md), env(safe-area-inset-left));
      padding-right: max(var(--sp-md), env(safe-area-inset-right));
    }


    /* ============================================================
       18. REDUCED MOTION
    ============================================================ */
    @media (prefers-reduced-motion: reduce) {
      .hero,
      .hero.loaded              { animation: none; opacity: 1; }
      .overlay-breathe          { animation: none; }
      .overlay-glow             { animation: none; }
      .mist-layer               { animation: none; }
      .firefly                  { display: none; }
      .orb                      { animation: none; opacity: 0.6; }
      .greeting, .sub, .orb-row { animation: none; opacity: 1; transform: none; }
      .scene                    { opacity: 1; }
      .loading-screen           { display: none; }
    }

  </style>
</head>
<body>

  <div class="loading-screen" id="loadingScreen" aria-hidden="true"></div>

  <div class="hero" id="hero">

    <div class="overlay-vignette" aria-hidden="true"></div>
    <div class="overlay-breathe"  aria-hidden="true"></div>
    <div class="overlay-glow"     aria-hidden="true"></div>
    <div class="overlay-brighten" id="overlayBrighten" aria-hidden="true"></div>

    <div class="mist-layer" aria-hidden="true"></div>

    <div class="fireflies" id="fireflies" aria-hidden="true"></div>

    <div class="scene" id="scene" aria-live="polite"></div>

  </div>


  <script>
  (function () {
    'use strict';

    /* ============================================================
       STORAGE KEYS — must match across all pages
    ============================================================ */
    const ACCESS_KEY    = 'rsvpAccess';
    const NAME_KEY      = 'guestName';
    const ATTEMPTS_KEY  = 'guestAttempts';
    const VISIT_KEY     = 'visitCount';
    const ATTENDANCE_KEY = 'guestAttendance';

    /* ============================================================
       REDIRECT URLS
    ============================================================ */
    const URL_RSVP    = 'rsvp.html';
    const URL_LANDING = 'landing.html';

    /* ============================================================
       ELEMENTS
    ============================================================ */
    const hero            = document.getElementById('hero');
    const scene           = document.getElementById('scene');
    const firefliesWrap   = document.getElementById('fireflies');
    const loadingScreen   = document.getElementById('loadingScreen');
    const overlayBrighten = document.getElementById('overlayBrighten');

    /* ============================================================
       DETECTION
    ============================================================ */
    const isMobile  = window.matchMedia('(hover: none)').matches;
    const isReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    /* ============================================================
       SESSION DATA
    ============================================================ */
    const access     = sessionStorage.getItem(ACCESS_KEY);
    const rawName    = sessionStorage.getItem(NAME_KEY) || '';
    const attempts   = Number(sessionStorage.getItem(ATTEMPTS_KEY)) || 0;
    const attendance = sessionStorage.getItem(ATTENDANCE_KEY) || '';

    /* ============================================================
       VISIT COUNT (option 4A)
       Stored in localStorage so it persists across sessions.
       Incremented every time this page loads.
    ============================================================ */
    let visitCount = Number(localStorage.getItem(VISIT_KEY)) || 0;
    visitCount++;
    localStorage.setItem(VISIT_KEY, String(visitCount));

    /* ============================================================
       NAME HELPERS
    ============================================================ */
    function formatName(name) {
      return name
        .trim()
        .split(' ')
        .map(p => p.charAt(0).toUpperCase() + p.slice(1).toLowerCase())
        .join(' ');
    }

    function firstName(name) {
      return formatName(name).split(' ')[0] || 'friend';
    }

    function fullName(name) {
      return formatName(name) || 'friend';
    }

    /* ============================================================
       LOAD SEQUENCE
    ============================================================ */
    function initLoadSequence() {
      if (isReduced) {
        loadingScreen.classList.add('done');
        hero.classList.add('loaded');
        scene.classList.add('visible');
        return;
      }

      setTimeout(() => {
        hero.classList.add('loaded');
        loadingScreen.classList.add('done');
      }, 200);

      setTimeout(() => {
        scene.classList.add('visible');
      }, 1000);
    }

    /* ============================================================
       FIREFLY GENERATOR
    ============================================================ */
    function createFireflies() {
      const count     = isMobile ? 14 : 24;
      const riseCount = Math.floor(count * 0.18);
      const fragment  = document.createDocumentFragment();

      for (let i = 0; i < count; i++) {
        const dot     = document.createElement('span');
        dot.className = 'firefly';

        const isRiser = i < riseCount;

        if (isRiser) {
          dot.classList.add('rise');
          dot.style.left   = (Math.random() * 90 + 5).toFixed(1) + '%';
          dot.style.bottom = (-4 + Math.random() * 10).toFixed(1) + '%';
          dot.style.top    = 'auto';
          dot.style.setProperty('--rx', (Math.random() * 60 - 30).toFixed(0) + 'px');
        } else {
          dot.style.left = (Math.random() * 97).toFixed(1) + '%';
          dot.style.top  = (Math.random() * 90).toFixed(1) + '%';
        }

        const baseSize  = isMobile ? 3.5 : 2.5;
        const sizeRange = isMobile ? 3.0 : 3.5;
        const size      = (Math.random() * sizeRange + baseSize).toFixed(1);

        const driftDur   = (Math.random() * 10 + 10).toFixed(1);
        const flickDur   = (Math.random() * 5  + 4.0).toFixed(1);
        const driftDelay = (Math.random() * 8).toFixed(2);
        const flickDelay = (Math.random() * 5).toFixed(2);

        dot.style.width             = size + 'px';
        dot.style.height            = size + 'px';
        dot.style.animationDuration = driftDur + 's, ' + flickDur + 's';
        dot.style.animationDelay    = driftDelay + 's, ' + flickDelay + 's';

        fragment.appendChild(dot);
      }

      firefliesWrap.appendChild(fragment);
    }

    /* ============================================================
       SCENE BUILDER
    ============================================================ */
    function buildScene(greeting, sub) {
      scene.innerHTML = `
        <p class="greeting">${greeting}</p>
        <p class="sub">${sub}</p>
        <div class="orb-row" aria-hidden="true">
          <span class="orb"></span>
          <span class="orb"></span>
          <span class="orb"></span>
        </div>
        <a href="#" class="fallback-btn" id="fallbackBtn">continue</a>
      `;
    }

    /* ============================================================
       LEAVE TRANSITION
       1. Brighten overlay activates (warm gold wash)
       2. Scene fades out
       3. Hero brightens and fades
       4. Redirect fires
    ============================================================ */
    function leaveTo(url, delay) {
      // step 1 — brighten overlay (option 3D)
      setTimeout(() => {
        overlayBrighten.classList.add('active');
      }, delay - 1400);

      // step 2 — scene fades
      setTimeout(() => {
        scene.classList.add('leaving');
      }, delay - 900);

      // step 3 — hero brightens + fades
      setTimeout(() => {
        hero.classList.add('leaving');
      }, delay - 600);

      // step 4 — redirect
      setTimeout(() => {
        window.location.href = url;
      }, delay);
    }

    /* ============================================================
       FALLBACK BUTTON
       Appears after 6s if redirect somehow fails
    ============================================================ */
    function initFallback(url) {
      setTimeout(() => {
        const btn = document.getElementById('fallbackBtn');
        if (btn) {
          btn.classList.add('visible');
          btn.href = url;
          btn.addEventListener('click', function (e) {
            e.preventDefault();
            overlayBrighten.classList.add('active');
            scene.classList.add('leaving');
            setTimeout(() => { hero.classList.add('leaving'); }, 300);
            setTimeout(() => { window.location.href = url; }, 1000);
          });
        }
      }, 6000);
    }

    /* ============================================================
       RETURNING GUEST GREETINGS (option 4A)
       Different message based on how many times they've visited.
       Uses full name (option 1C).
       Sub text reflects their attendance (option 4D).
    ============================================================ */
    function getReturningGreeting(name) {
      const full  = fullName(name);
      const first = firstName(name);

      if (visitCount === 1) {
        return 'Welcome back, ' + full + '.';
      } else if (visitCount === 2) {
        return 'Back again, ' + first + '.';
      } else if (visitCount === 3) {
        return first + '. You\'re becoming a regular.';
      } else if (visitCount <= 6) {
        return 'The forest knows your footsteps, ' + first + '.';
      } else {
        return first + '. We\'ve been expecting you.';
      }
    }

    function getReturningSubText() {
      if (attendance === 'yes') {
        return 'we\'re so glad you\'re coming';
      } else if (attendance === 'no') {
        return 'you\'ll be missed, but you\'re still part of the story';
      } else {
        return 'the forest remembers you';
      }
    }

    /* ============================================================
       FLOW LOGIC

       CASE 1 — Returning guest (already has access)
         option 4C: instant redirect — no wait, no ceremony
         They've already been through it.

       CASE 2 — New guest
         Shows greeting based on attempt count
         Redirects to rsvp.html after ~5.2s
    ============================================================ */
    function initFlow() {

      if (access === 'true') {

        /* --- RETURNING GUEST (option 4C — skip, go now) --- */
        buildScene(
          getReturningGreeting(rawName),
          getReturningSubText()
        );

        // brief moment to show them the greeting, then go immediately
        leaveTo(URL_LANDING, 2200);
        initFallback(URL_LANDING);

      } else {

        /* --- NEW GUEST --- */
        let subText = 'come on in';

        if (attempts >= 5 && attempts < 15) {
          subText = 'try again… carefully';
        } else if (attempts >= 15) {
          subText = 'the forest is watching you';
        }

        buildScene(
          'Oh hi there.<br>Emily and Travis have been expecting you.',
          subText
        );

        leaveTo(URL_RSVP, 5200);
        initFallback(URL_RSVP);
      }
    }

    /* ============================================================
       INIT
    ============================================================ */
    function init() {
      initLoadSequence();
      createFireflies();
      initFlow();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

  })();
  </script>
