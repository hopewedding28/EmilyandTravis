<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>

<link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light+Two&family=Zen+Loop&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: url("assets/backgrounds/gate.png") center / cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Zen Loop', sans-serif;
  overflow: hidden;
}

body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center,
    rgba(10,10,10,0.3) 0%,
    rgba(10,10,10,0.7) 100%);
}

.scene {
  position: relative;
  width: 100%;
  max-width: 600px;
  text-align: center;
  padding: 2rem;
  color: #f0ead6;
}

.greeting {
  font-family: 'Shadows Into Light Two', cursive;
  font-size: clamp(1.5rem, 3vw, 1.9rem);
  line-height: 1.7;
  opacity: 0;
  animation: fadeIn 1.4s ease forwards 0.4s;
  text-shadow: 0 2px 10px rgba(0,0,0,0.7);
}

.sub {
  margin-top: 0.6rem;
  font-size: 0.95rem;
  opacity: 0;
  animation: fadeIn 1.2s ease forwards 1.8s;
  color: rgba(240,234,214,0.7);
}

.fairies {
  margin-top: 2.5rem;
  height: 40px;
  position: relative;
  opacity: 0;
  animation: fadeIn 1s ease forwards 2.4s;
}

.dot {
  position: absolute;
  top: 50%;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: rgba(255,245,180,0.9);
  box-shadow: 0 0 10px rgba(255,245,180,0.7);
  transform: translateY(-50%);
  animation: fairyFloat var(--dur) ease-in-out infinite var(--delay);
}

.dot:nth-child(1) { left: calc(50% - 60px); --dur: 2.1s; --delay: 0s; }
.dot:nth-child(2) { left: calc(50% - 10px); --dur: 2.6s; --delay: 0.4s; }
.dot:nth-child(3) { left: calc(50% + 40px); --dur: 1.9s; --delay: 0.8s; }
.dot:nth-child(4) { left: calc(50% - 110px); --dur: 2.4s; --delay: 0.2s; }
.dot:nth-child(5) { left: calc(50% + 90px); --dur: 2.2s; --delay: 0.6s; }

@keyframes fairyFloat {
  0%, 100% { transform: translateY(-50%); opacity: 0.4; }
  50% { transform: translateY(calc(-50% - 10px)); opacity: 1; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeOut {
  to { opacity: 0; }
}

.scene.leaving {
  animation: fadeOut 0.8s ease forwards;
}
</style>
</head>

<body>

<div class="scene" id="scene">
  <p class="greeting">
    Oh hi there!<br>
    Emily and Travis have been expecting you.
  </p>

  <p class="sub">come on in</p>

  <div class="fairies">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<script>
setTimeout(() => {
  document.getElementById('scene').classList.add('leaving');
}, 4500);

setTimeout(() => {
  window.location.href = "rsvp.html";
}, 5300);
</script>

</body>
</html>
