<!DOCTYPE html>
<html lang="en">
<head>

  <!-- ============================================================
       EMILY & TRAVIS WEDDING SITE
       FILE: codepage.html
       PURPOSE: The gatekeeper. You submitted your RSVP,
                Emily sent you a code, now you prove you
                belong here. No code = no entry, full stop.
                This is the bouncer of the enchanted forest.
       BACKGROUND: inside-gate.png
       PALETTE: Burnt Orange, Plum Purple, Dark Green, Black
  ============================================================ -->

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#060b06" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>Emily &amp; Travis — Enter Your Code</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light+Two&family=Zen+Loop&display=swap" rel="stylesheet" />
  <link rel="preload" href="assets/backgrounds/gate.png" as="image" />


  <!-- guest list — the only file you need to edit to add guests -->
  <script src="guests.js"></script>

  <style>

    /* ============================================================
       TABLE OF CONTENTS
       1.  CSS VARIABLES / TOKENS
       2.  RESET + BASE
       3.  FOREST BACKGROUND
       4.  OVERLAY SYSTEM
       5.  MIST LAYER
       6.  FIREFLY SYSTEM (true lightning bug colors)
       7.  LOADING SCREEN
       8.  GATE CARD
       9.  GATE CARD — SVG DECORATIONS
       10. GATE CARD — INNER FRAMES
       11. GATE TITLE
       12. GATE SUBTITLE
       13. CODE INPUT SYSTEM
       14. CODE INPUT — GLOW STATE
       15. CODE INPUT — ERROR STATE
       16. CODE INPUT — SUCCESS STATE
       17. ENTER BUTTON
       18. CODE MESSAGE LINE
       19. LOCK STATE
       20. CHAOS SYSTEM EFFECTS
       21. RED TINT FLASH
       22. SCREEN FLICKER
       23. CARD SHAKE
       24. SUCCESS TRANSITION
       25. FIREFLY CONVERGE ON SUCCESS
       26. ALREADY CLAIMED MESSAGE
       27. POPUP / MODAL
       28. ANIMATIONS LIBRARY
       29. MOBILE / RESPONSIVE
       30. SAFE AREA INSETS
       31. REDUCED MOTION
    ============================================================ */


    /* ============================================================
       1. CSS VARIABLES / TOKENS
       Identical to rsvp.html — site-wide consistency
    ============================================================ */
    :root {
      --burnt-orange:       #CC5500;
      --burnt-orange-dim:   rgba(204, 85, 0, 0.55);
      --burnt-orange-soft:  rgba(204, 85, 0, 0.28);
      --burnt-orange-glow:  rgba(204, 85, 0, 0.20);
      --burnt-orange-trace: rgba(204, 85, 0, 0.08);

      --plum:               #673147;
      --plum-dim:           rgba(103, 49, 71, 0.65);
      --plum-soft:          rgba(103, 49, 71, 0.35);
      --plum-border:        rgba(103, 49, 71, 0.45);

      --forest-green:       #1a3a1a;
      --forest-green-deep:  #013220;

      --gold:               #f3d37a;
      --gold-dim:           rgba(243, 211, 122, 0.45);
      --mist:               rgba(248, 242, 224, 0.97);
      --mist-soft:          rgba(242, 235, 212, 0.88);
      --mist-faint:         rgba(240, 234, 214, 0.48);
      --text-main:          rgba(232, 225, 199, 0.92);

      --card-bg:            rgba(6, 8, 6, 0.88);
      --card-border:        rgba(103, 49, 71, 0.38);
      --field-bg:           rgba(4, 8, 4, 0.82);
      --field-border:       rgba(103, 49, 71, 0.28);

      --forest-deep:        #060b06;
      --danger-red:         rgba(135, 18, 18, 0.32);
      --popup-bg:           rgba(6, 8, 6, 0.96);

      --t-fast:             250ms;
      --t-base:             450ms;
      --t-slow:             700ms;

      --ease-soft:          cubic-bezier(0.25, 0.8, 0.25, 1);
      --ease-default:       cubic-bezier(0.4, 0, 0.2, 1);
      --ease-spring:        cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-out:           cubic-bezier(0.0, 0, 0.2, 1);

      --sp-xs:  8px;
      --sp-sm:  16px;
      --sp-md:  24px;
      --sp-lg:  32px;
      --sp-xl:  48px;
    }


    /* ============================================================
       2. RESET + BASE
    ============================================================ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      width: 100%;
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      font-family: 'Zen Loop', sans-serif;
      background: var(--forest-deep);
      color: var(--text-main);
    }


    /* ============================================================
       3. FOREST BACKGROUND
    ============================================================ */
    .forest {
      min-height: 100vh;
      min-height: 100dvh;
      background: url("assets/backgrounds/gate.png") center / cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 3rem 1.25rem;
      overflow: hidden;
      isolation: isolate;
    }


    /* ============================================================
       4. OVERLAY SYSTEM
    ============================================================ */
    .forest::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      background: radial-gradient(
        ellipse at center,
        rgba(6, 6, 6, 0.10) 0%,
        rgba(6, 6, 6, 0.35) 52%,
        rgba(6, 6, 6, 0.55) 100%
      );
      pointer-events: none;
    }

    /* breathing vignette */
    .overlay-breathe {
      position: absolute;
      inset: 0;
      z-index: 2;
      background: radial-gradient(
        ellipse at center,
        transparent 30%,
        rgba(4, 6, 4, 0.20) 100%
      );
      pointer-events: none;
      animation: breathePulse 10s ease-in-out infinite;
    }

    @keyframes breathePulse {
      0%,  100% { opacity: 0.5; }
      50%        { opacity: 1.0; }
    }

    /* warm glow center */
    .overlay-glow {
      position: absolute;
      inset: 0;
      z-index: 2;
      background: radial-gradient(
        ellipse at 50% 40%,
        rgba(204, 85, 0, 0.05) 0%,
        transparent 55%
      );
      pointer-events: none;
      animation: glowPulse 16s ease-in-out infinite alternate;
    }

    @keyframes glowPulse {
      0%   { opacity: 0.4; }
      100% { opacity: 1.0; }
    }

    /* red tint flash — chaos system */
    .forest.red-tint::after {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--danger-red);
      z-index: 5;
      animation: redFlash 0.55s ease forwards;
      pointer-events: none;
    }

    @keyframes redFlash {
      0%   { opacity: 0; }
      20%  { opacity: 1; }
      100% { opacity: 0; }
    }

    /* screen flicker — chaos system attempt 15 */
    .forest.flicker {
      animation: screenFlicker 0.20s linear 1;
    }

    @keyframes screenFlicker {
      0%   { opacity: 1; }
      18%  { opacity: 0.10; }
      38%  { opacity: 1; }
      58%  { opacity: 0.15; }
      100% { opacity: 1; }
    }


    /* ============================================================
       5. MIST LAYER
    ============================================================ */
    .mist-layer {
      position: absolute;
      inset: auto 0 0 0;
      height: 28vh;
      z-index: 3;
      background:
        radial-gradient(ellipse at 20% 100%, rgba(255,255,255,0.022), transparent 36%),
        radial-gradient(ellipse at 50% 100%, rgba(255,255,255,0.034), transparent 42%),
        radial-gradient(ellipse at 80% 100%, rgba(255,255,255,0.024), transparent 38%);
      filter: blur(22px);
      opacity: 0.88;
      pointer-events: none;
      animation: mistDrift 22s ease-in-out infinite alternate;
    }

    @keyframes mistDrift {
      0%   { transform: translateX(-2%) translateY(0);   opacity: 0.68; }
      100% { transform: translateX(2%)  translateY(-1%); opacity: 0.95; }
    }


    /* ============================================================
       6. FIREFLY SYSTEM — true lightning bug colors
    ============================================================ */
    .fireflies {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      overflow: hidden;
    }

    .firefly {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation-name: driftFloat, flickerGlow;
      animation-timing-function: linear, ease-in-out;
      animation-iteration-count: infinite, infinite;
      will-change: transform, opacity;
    }

    .firefly.color-yellowgreen {
      background: radial-gradient(circle, rgba(200,240,80,0.98) 0%, rgba(160,210,60,0.55) 48%, transparent 100%);
      box-shadow: 0 0 8px rgba(180,230,70,0.65), 0 0 20px rgba(160,210,50,0.28);
    }

    .firefly.color-amber {
      background: radial-gradient(circle, rgba(255,180,60,0.98) 0%, rgba(240,150,30,0.55) 48%, transparent 100%);
      box-shadow: 0 0 8px rgba(255,170,50,0.65), 0 0 20px rgba(240,140,20,0.28);
    }

    .firefly.color-gold {
      background: radial-gradient(circle, rgba(255,240,140,0.98) 0%, rgba(243,211,122,0.55) 48%, transparent 100%);
      box-shadow: 0 0 8px rgba(243,220,120,0.65), 0 0 20px rgba(230,200,100,0.28);
    }

    .firefly.color-bluewhite {
      background: radial-gradient(circle, rgba(220,240,255,0.98) 0%, rgba(180,220,255,0.55) 48%, transparent 100%);
      box-shadow: 0 0 8px rgba(200,230,255,0.65), 0 0 20px rgba(160,210,255,0.28);
    }

    .firefly.color-warmwhite {
      background: radial-gradient(circle, rgba(255,252,230,0.98) 0%, rgba(255,245,200,0.55) 48%, transparent 100%);
      box-shadow: 0 0 8px rgba(255,248,220,0.65), 0 0 20px rgba(255,240,190,0.28);
    }

    .firefly.rise {
      animation-name: driftRise, flickerGlow;
    }

    @keyframes driftFloat {
      0%   { transform: translate3d(0,0,0) scale(0.88); }
      20%  { transform: translate3d(18px,-26px,0) scale(1.07); }
      40%  { transform: translate3d(-12px,-42px,0) scale(0.94); }
      60%  { transform: translate3d(15px,-30px,0) scale(1.11); }
      80%  { transform: translate3d(-9px,-15px,0) scale(0.97); }
      100% { transform: translate3d(-5px,0,0) scale(0.90); }
    }

    @keyframes driftRise {
      0%   { transform: translate3d(0,0,0) scale(0.7); opacity: 0; }
      8%   { opacity: 0.7; }
      100% { transform: translate3d(var(--rx,18px),-140px,0) scale(1.1); opacity: 0; }
    }

    @keyframes flickerGlow {
      0%,  100% { opacity: 0.04; }
      10%        { opacity: 0.68; }
      26%        { opacity: 0.10; }
      48%        { opacity: 0.80; }
      66%        { opacity: 0.16; }
      82%        { opacity: 0.55; }
    }


    /* ============================================================
       7. LOADING SCREEN
    ============================================================ */
    .loading-screen {
      position: fixed;
      inset: 0;
      background: var(--forest-deep);
      z-index: 100;
      pointer-events: none;
      transition: opacity 1.0s var(--ease-soft);
    }

    .loading-screen.done {
      opacity: 0;
      pointer-events: none;
    }


    /* ============================================================
       8. GATE CARD
       More minimal than rsvp.html — this is a single moment.
       One input, one button, one purpose.
    ============================================================ */
    .gate-card {
      position: relative;
      z-index: 6;
      width: 100%;
      max-width: 480px;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 4px;
      padding: 3rem 2.5rem 2.8rem;
      text-align: center;

      box-shadow:
        0 0  0    1px  rgba(103, 49, 71, 0.10),
        0 0  50px 0    rgba(204, 85, 0,  0.10),
        0 0  90px 0    rgba(103, 49, 71, 0.08),
        0 28px 70px    rgba(0, 0, 0, 0.60),
        inset 0 1px 0  rgba(255, 255, 255, 0.02),
        inset 0 0 50px rgba(204, 85, 0, 0.03);

      opacity: 0;
      transform: translateY(18px);
      transition:
        opacity   0.8s var(--ease-soft),
        transform 0.8s var(--ease-soft);
    }

    .gate-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* chaos shake */
    .gate-card.chaos-shake {
      animation: cardShake 0.38s var(--ease-default);
    }

    @keyframes cardShake {
      0%   { transform: translateX(0); }
      18%  { transform: translateX(-8px); }
      36%  { transform: translateX(7px); }
      54%  { transform: translateX(-5px); }
      72%  { transform: translateX(4px); }
      100% { transform: translateX(0); }
    }

    /* parchment texture */
    .card-texture {
      position: absolute;
      inset: 0;
      z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      opacity: 0.45;
      pointer-events: none;
      mix-blend-mode: overlay;
      border-radius: 4px;
    }

    .gate-card > *:not(.card-texture):not(.converge-wrap) {
      position: relative;
      z-index: 1;
    }


    /* ============================================================
       9. GATE CARD — SVG DECORATIONS
       Botanical corners + key motif
    ============================================================ */
    .corner-decor {
      position: absolute;
      width: 60px;
      height: 60px;
      opacity: 0.50;
      pointer-events: none;
      z-index: 2;
    }

    .corner-decor.tl { top: 0;    left: 0; }
    .corner-decor.tr { top: 0;    right: 0;  transform: scaleX(-1); }
    .corner-decor.bl { bottom: 0; left: 0;   transform: scaleY(-1); }
    .corner-decor.br { bottom: 0; right: 0;  transform: scale(-1,-1); }

    .corner-decor path,
    .corner-decor circle {
      stroke-dasharray: 180;
      stroke-dashoffset: 180;
      animation: drawCorner 1.8s var(--ease-soft) forwards;
    }

    .corner-decor.tl path { animation-delay: 0.6s; }
    .corner-decor.tr path { animation-delay: 0.8s; }
    .corner-decor.bl path { animation-delay: 1.0s; }
    .corner-decor.br path { animation-delay: 1.2s; }

    @keyframes drawCorner {
      to { stroke-dashoffset: 0; }
    }

    /* key SVG above title */
    .key-icon {
      display: flex;
      justify-content: center;
      margin-bottom: 0.8rem;
    }

    .key-icon svg {
      width: 36px;
      height: 36px;
      filter: drop-shadow(0 0 6px rgba(204, 85, 0, 0.50));
      animation: keyGlow 4.5s ease-in-out infinite;
    }

    @keyframes keyGlow {
      0%,  100% { filter: drop-shadow(0 0 4px rgba(204,85,0,0.35)); opacity: 0.65; }
      50%        { filter: drop-shadow(0 0 12px rgba(204,85,0,0.70)); opacity: 0.90; }
    }


    /* ============================================================
       10. GATE CARD — INNER FRAMES
    ============================================================ */
    .inner-frame {
      position: absolute;
      inset: 10px;
      z-index: 0;
      border: 1px solid rgba(103, 49, 71, 0.10);
      border-radius: 2px;
      pointer-events: none;
    }

    .inner-frame-2 {
      position: absolute;
      inset: 14px;
      z-index: 0;
      border: 1px solid rgba(204, 85, 0, 0.05);
      border-radius: 2px;
      pointer-events: none;
    }


    /* ============================================================
       11. GATE TITLE
    ============================================================ */
    .gate-title {
      font-family: 'Shadows Into Light Two', cursive;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      color: var(--mist);
      line-height: 1.1;
      letter-spacing: 0.02em;
      margin-bottom: 0.5rem;
      text-shadow:
        0 0  4px  rgba(0, 0, 0, 0.98),
        0 2px 12px rgba(0, 0, 0, 0.92),
        0 0  30px rgba(204, 85, 0, 0.25),
        0 0  50px rgba(204, 85, 0, 0.10);
      opacity: 0;
      animation: riseIn var(--t-slow) var(--ease-soft) forwards;
      animation-delay: 800ms;
    }


    /* ============================================================
       12. GATE SUBTITLE
    ============================================================ */
    .gate-subtitle {
      font-family: 'Zen Loop', sans-serif;
      font-size: clamp(0.82rem, 1.6vw, 0.94rem);
      color: var(--mist-faint);
      font-style: italic;
      letter-spacing: 0.04em;
      line-height: 1.6;
      margin-bottom: 2rem;
      text-shadow:
        0 1px 8px rgba(0, 0, 0, 0.95),
        0 0  20px rgba(0, 0, 0, 0.80);
      opacity: 0;
      animation: riseIn var(--t-slow) var(--ease-soft) forwards;
      animation-delay: 1100ms;
    }


    /* ============================================================
       13. CODE INPUT SYSTEM
       Large, dramatic, centered. Letters styled as they type.
       Auto-caps, no spaces, forest-themed placeholder.
    ============================================================ */
    .code-input-wrap {
      position: relative;
      margin-bottom: var(--sp-sm);
      opacity: 0;
      animation: riseIn var(--t-slow) var(--ease-soft) forwards;
      animation-delay: 1400ms;
    }

    .code-input {
      width: 100%;
      padding: 1rem 1.2rem;
      font-family: 'Zen Loop', sans-serif;
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      letter-spacing: 0.22em;
      text-align: center;
      text-transform: uppercase;
      color: var(--mist);
      background: var(--field-bg);
      border: 1px solid var(--field-border);
      border-radius: 3px;
      outline: none;
      caret-color: var(--burnt-orange);

      box-shadow:
        inset 0 2px 8px rgba(0, 0, 0, 0.60),
        inset 0 0 0 1px rgba(103, 49, 71, 0.08);

      transition:
        border-color  0.28s var(--ease-default),
        box-shadow    0.28s var(--ease-default),
        background    0.28s var(--ease-default),
        color         0.28s var(--ease-default);

      -webkit-tap-highlight-color: transparent;
    }

    .code-input::placeholder {
      color: rgba(232, 225, 199, 0.22);
      font-style: italic;
      letter-spacing: 0.08em;
      font-size: 0.95rem;
    }

    /* focus */
    .code-input:focus {
      border-color: rgba(204, 85, 0, 0.48);
      background: rgba(8, 12, 8, 0.90);
      box-shadow:
        inset 0 2px 8px rgba(0, 0, 0, 0.60),
        0 0 0   1px rgba(204, 85, 0, 0.25),
        0 0 16px    rgba(204, 85, 0, 0.18),
        0 0 32px    rgba(204, 85, 0, 0.08);
    }


    /* ============================================================
       14. CODE INPUT — GLOW STATE (correct code entered)
    ============================================================ */
    .code-input.glow {
      border-color: rgba(204, 85, 0, 0.75);
      color: rgba(255, 200, 120, 0.98);
      background: rgba(10, 14, 8, 0.92);
      box-shadow:
        inset 0 2px 8px rgba(0, 0, 0, 0.50),
        0 0 0   2px rgba(204, 85, 0, 0.45),
        0 0 20px    rgba(204, 85, 0, 0.30),
        0 0 40px    rgba(204, 85, 0, 0.15);
      animation: inputGlowPulse 1.2s ease-in-out infinite;
    }

    @keyframes inputGlowPulse {
      0%,  100% { box-shadow: inset 0 2px 8px rgba(0,0,0,0.50), 0 0 0 2px rgba(204,85,0,0.40), 0 0 20px rgba(204,85,0,0.25); }
      50%        { box-shadow: inset 0 2px 8px rgba(0,0,0,0.50), 0 0 0 2px rgba(204,85,0,0.60), 0 0 32px rgba(204,85,0,0.40), 0 0 60px rgba(204,85,0,0.18); }
    }


    /* ============================================================
       15. CODE INPUT — ERROR STATE (wrong code)
    ============================================================ */
    .code-input.error {
      border-color: rgba(150, 30, 30, 0.60);
      box-shadow:
        inset 0 2px 8px rgba(0, 0, 0, 0.60),
        0 0 0   1px rgba(150, 30, 30, 0.30),
        0 0 14px    rgba(150, 30, 30, 0.15);
      animation: inputShake 0.35s var(--ease-default);
    }

    @keyframes inputShake {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(-6px); }
      40%  { transform: translateX(5px); }
      60%  { transform: translateX(-4px); }
      80%  { transform: translateX(3px); }
      100% { transform: translateX(0); }
    }


    /* ============================================================
       16. CODE INPUT — SUCCESS STATE
       Handled via .glow class above + JS transition
    ============================================================ */


    /* ============================================================
       17. ENTER BUTTON
       Wispy style matching site — plum border, burnt orange hover
    ============================================================ */
    .enter-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      padding: 0.92rem 1.5rem;
      font-family: 'Zen Loop', sans-serif;
      font-size: 0.92rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--mist-soft);
      background: rgba(103, 49, 71, 0.18);
      border: 1px solid var(--plum-border);
      border-radius: 3px;
      cursor: pointer;
      outline: none;
      -webkit-tap-highlight-color: transparent;

      box-shadow:
        0 0 0   1px rgba(103, 49, 71, 0.10),
        0 0 18px    rgba(103, 49, 71, 0.12),
        0 4px 14px  rgba(0, 0, 0, 0.40),
        inset 0 1px 0 rgba(255, 255, 255, 0.02);

      opacity: 0;
      animation: riseIn var(--t-slow) var(--ease-soft) forwards;
      animation-delay: 1600ms;

      transition:
        background    0.28s var(--ease-default),
        border-color  0.28s var(--ease-default),
        box-shadow    0.28s var(--ease-default),
        color         0.28s var(--ease-default),
        transform     0.12s var(--ease-default);
    }

    .enter-btn:hover:not(:disabled) {
      background: rgba(204, 85, 0, 0.18);
      border-color: rgba(204, 85, 0, 0.55);
      color: var(--mist);
      box-shadow:
        0 0 0   1px rgba(204, 85, 0, 0.20),
        0 0 22px    rgba(204, 85, 0, 0.18),
        0 4px 18px  rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.02);
    }

    .enter-btn:active:not(:disabled) {
      transform: scale(0.982);
    }

    .enter-btn:disabled {
      opacity: 0.50;
      cursor: not-allowed;
    }

    /* loading dots inside button */
    .btn-loader {
      display: none;
      align-items: center;
      gap: 0.28rem;
    }

    .btn-loader.active {
      display: flex;
    }

    .btn-text.hidden { display: none; }

    .dot-pulse {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.9;
      animation: dotPulse 1.1s infinite ease-in-out;
    }

    .dot-pulse:nth-child(2) { animation-delay: 0.14s; }
    .dot-pulse:nth-child(3) { animation-delay: 0.28s; }

    @keyframes dotPulse {
      0%, 80%, 100% { transform: scale(0.5);  opacity: 0.35; }
      40%            { transform: scale(1.0);  opacity: 1.00; }
    }


    /* ============================================================
       18. CODE MESSAGE LINE
       Forest response to each attempt
    ============================================================ */
    .code-message {
      min-height: 1.5em;
      margin-top: var(--sp-sm);
      font-size: 0.92rem;
      color: rgba(204, 85, 0, 0.82);
      font-style: italic;
      letter-spacing: 0.03em;
      line-height: 1.5;
      text-shadow: 0 0 10px rgba(204, 85, 0, 0.25);
      opacity: 0;
      transition:
        opacity   0.45s var(--ease-default),
        transform 0.45s var(--ease-default),
        color     0.45s var(--ease-default);
      transform: translateY(4px);
    }

    .code-message.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* success message — gold */
    .code-message.success {
      color: rgba(243, 211, 122, 0.92);
      text-shadow: 0 0 12px rgba(243, 211, 122, 0.35);
    }

    /* locked message — plum */
    .code-message.locked {
      color: rgba(103, 49, 71, 0.82);
      text-shadow: 0 0 10px rgba(103, 49, 71, 0.25);
    }

    /* claimed message — warning */
    .code-message.claimed {
      color: rgba(180, 60, 60, 0.88);
      text-shadow: 0 0 10px rgba(150, 30, 30, 0.25);
    }


    /* ============================================================
       19. LOCK STATE
       After 30 bad attempts — 5 minute lockout
    ============================================================ */
    .lock-timer {
      display: inline-block;
      font-family: 'Zen Loop', sans-serif;
      font-size: 0.85rem;
      color: rgba(103, 49, 71, 0.72);
      letter-spacing: 0.08em;
      margin-top: 0.3rem;
    }


    /* ============================================================
       20. CHAOS SYSTEM EFFECTS
       Tier messages, shake, flicker, red tint
       All handled via JS + CSS classes defined in sections 21-23
    ============================================================ */


    /* ============================================================
       21. RED TINT FLASH — defined in section 4
    ============================================================ */


    /* ============================================================
       22. SCREEN FLICKER — defined in section 4
    ============================================================ */


    /* ============================================================
       23. CARD SHAKE — defined in section 8
    ============================================================ */


    /* ============================================================
       24. SUCCESS TRANSITION
       Fireflies converge, screen brightens, redirect fires
    ============================================================ */
    .success-overlay {
      position: fixed;
      inset: 0;
      background: rgba(243, 220, 160, 0);
      z-index: 8;
      pointer-events: none;
      transition: background 1.4s var(--ease-out);
    }

    .success-overlay.active {
      background: rgba(243, 220, 160, 0.28);
    }


    /* ============================================================
       25. FIREFLY CONVERGE ON SUCCESS
       Fireflies from around the screen fly to center
    ============================================================ */
    .converge-wrap {
      position: absolute;
      inset: 0;
      z-index: 7;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.35s var(--ease-default);
    }

    .converge-wrap.show {
      opacity: 1;
    }

    .converge-center {
      position: relative;
      width: 180px;
      height: 180px;
    }

    .converge-firefly {
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      animation: convergeCenter 1.1s var(--ease-soft) forwards;
    }

    .converge-firefly.orange {
      background: rgba(255,160,50,0.95);
      box-shadow: 0 0 12px rgba(255,140,30,0.85), 0 0 22px rgba(204,85,0,0.50);
    }

    .converge-firefly.plum {
      background: rgba(200,120,160,0.95);
      box-shadow: 0 0 12px rgba(180,90,130,0.85), 0 0 22px rgba(103,49,71,0.50);
    }

    .converge-firefly.gold {
      background: rgba(255,230,120,0.95);
      box-shadow: 0 0 12px rgba(243,211,122,0.85), 0 0 22px rgba(230,190,80,0.50);
    }

    @keyframes convergeCenter {
      0%   { transform: translate(var(--startX), var(--startY)) scale(0.6); opacity: 0; }
      18%  { opacity: 1; }
      100% { transform: translate(0,0) scale(1.4); opacity: 0; }
    }


    /* ============================================================
       26. ALREADY CLAIMED MESSAGE
       When a code has already been used on another device
    ============================================================ */
    .claimed-notice {
      margin-top: var(--sp-md);
      padding: 1.2rem 1rem;
      background: rgba(103, 49, 71, 0.12);
      border: 1px solid rgba(103, 49, 71, 0.25);
      border-radius: 3px;
      font-size: 0.88rem;
      color: var(--mist-faint);
      line-height: 1.6;
      font-style: italic;
      display: none;
      animation: riseIn 0.5s var(--ease-soft) forwards;
    }

    .claimed-notice.show {
      display: block;
    }


    /* ============================================================
       27. POPUP / MODAL
    ============================================================ */
    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
      padding: 1rem;
    }

    .popup-overlay.show {
      display: flex;
    }

    .popup-box {
      width: min(380px, 100%);
      background: var(--popup-bg);
      border: 1px solid rgba(103, 49, 71, 0.30);
      padding: 1.8rem 1.4rem 1.4rem;
      border-radius: 4px;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(103, 49, 71, 0.12),
        0 24px 48px rgba(0, 0, 0, 0.55);
      animation: popupIn 0.35s var(--ease-spring);
    }

    @keyframes popupIn {
      from { transform: scale(0.92) translateY(10px); opacity: 0; }
      to   { transform: scale(1)    translateY(0);    opacity: 1; }
    }

    .popup-box p {
      font-size: 1.02rem;
      line-height: 1.55;
      color: var(--text-main);
    }

    .popup-close-btn {
      margin-top: 1.2rem;
      padding: 0.72rem 1.8rem;
      background: transparent;
      border: 1px solid var(--plum-border);
      color: var(--mist-soft);
      border-radius: 3px;
      font-family: 'Zen Loop', sans-serif;
      font-size: 0.92rem;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.22s var(--ease-default), border-color 0.22s var(--ease-default);
    }

    .popup-close-btn:hover {
      background: var(--plum-soft);
      border-color: rgba(103, 49, 71, 0.65);
    }


    /* ============================================================
       28. ANIMATIONS LIBRARY
    ============================================================ */
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInSoft {
      from { opacity: 0; }
      to   { opacity: 1; }
    }


    /* ============================================================
       29. MOBILE / RESPONSIVE
    ============================================================ */
    @media (max-width: 600px) {
      .forest {
        padding: 2rem 0.9rem;
        align-items: flex-start;
        padding-top: max(3rem, env(safe-area-inset-top, 3rem));
      }

      .gate-card {
        padding: 2.2rem 1.4rem 2rem;
        max-width: 100%;
      }

      .gate-title {
        font-size: clamp(1.6rem, 7vw, 2rem);
      }

      .code-input {
        font-size: clamp(1rem, 5vw, 1.2rem);
        padding: 0.92rem 1rem;
        letter-spacing: 0.16em;
      }

      .corner-decor {
        width: 44px;
        height: 44px;
      }
    }

    @media (max-width: 380px) {
      .gate-title    { font-size: clamp(1.4rem, 8vw, 1.7rem); }
      .gate-subtitle { font-size: 0.80rem; }
      .code-input    { font-size: 1rem; letter-spacing: 0.12em; }
    }


    /* ============================================================
       30. SAFE AREA INSETS
    ============================================================ */
    .forest {
      padding-top:    max(3rem, env(safe-area-inset-top));
      padding-bottom: max(3rem, env(safe-area-inset-bottom));
    }


    /* ============================================================
       31. REDUCED MOTION
    ============================================================ */
    @media (prefers-reduced-motion: reduce) {
      .overlay-breathe     { animation: none; }
      .overlay-glow        { animation: none; }
      .mist-layer          { animation: none; }
      .firefly             { display: none; }
      .key-icon svg        { animation: none; }
      .corner-decor path,
      .corner-decor circle { animation: none; stroke-dashoffset: 0; }
      .gate-title,
      .gate-subtitle,
      .code-input-wrap,
      .enter-btn           { animation: none; opacity: 1; transform: none; }
      .gate-card           { opacity: 1; transform: none; transition: none; }
      .loading-screen      { display: none; }
    }

  </style>
</head>
<body>

  <script>
  (function () {
    'use strict';

    /* ============================================================
       STORAGE KEYS
       Must match across all pages
    ============================================================ */
    const ACCESS_KEY      = 'rsvpAccess';
    const GUEST_KEY       = 'guestName';
    const DEVICE_KEY      = 'forestDeviceId';
    const CLAIMED_PREFIX  = 'claimed_';
    const ATTEMPT_KEY     = 'forestCodeAttempts';
    const LOCK_KEY        = 'forestCodeLockUntil';
    const GUEST_ATT_KEY   = 'guestAttempts';

    /* ============================================================
       REDIRECT URLS
    ============================================================ */
    const URL_TRANSITION2 = 'transition2.html';

    /* ============================================================
       ELEMENTS
    ============================================================ */
    const forest         = document.getElementById('forest');
    const gateCard       = document.getElementById('gateCard');
    const firefliesWrap  = document.getElementById('fireflies');
    const loadingScreen  = document.getElementById('loadingScreen');
    const successOverlay = document.getElementById('successOverlay');
    const convergeWrap   = document.getElementById('convergeWrap');
    const convergeCenter = document.getElementById('convergeCenter');

    const codeInput      = document.getElementById('codeInput');
    const enterBtn       = document.getElementById('enterBtn');
    const btnText        = document.getElementById('btnText');
    const btnLoader      = document.getElementById('btnLoader');
    const codeMessage    = document.getElementById('codeMessage');
    const claimedNotice  = document.getElementById('claimedNotice');

    /* ============================================================
       DETECTION
    ============================================================ */
    const isMobile  = window.matchMedia('(hover: none)').matches;
    const isReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    /* ============================================================
       POPUP
    ============================================================ */
    function showPopup(msg) {
      document.getElementById('popupMessage').textContent = msg;
      document.getElementById('popup').classList.add('show');
    }

    window.closePopup = function () {
      document.getElementById('popup').classList.remove('show');
    };

    /* ============================================================
       DEVICE ID
       Each device gets a unique ID stored in localStorage.
       Used to tie a code to the device that claimed it.
       If a different device tries the same code → blocked.
    ============================================================ */
    function getDeviceId() {
      let id = localStorage.getItem(DEVICE_KEY);
      if (!id) {
        /* generate a random unique ID for this device */
        id = 'dev_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
        localStorage.setItem(DEVICE_KEY, id);
      }
      return id;
    }

    const DEVICE_ID = getDeviceId();

    /* ============================================================
       ALREADY AUTHENTICATED?
       If this device already has rsvpAccess = true,
       skip the code page entirely and go straight to transition2.
    ============================================================ */
    function checkExistingAccess() {
      const access = localStorage.getItem(ACCESS_KEY);
      if (access === 'true') {
        window.location.replace(URL_TRANSITION2);
        return true;
      }
      return false;
    }

    /* ============================================================
       LOAD SEQUENCE
    ============================================================ */
    function initLoadSequence() {
      if (isReduced) {
        loadingScreen.style.display = 'none';
        gateCard.classList.add('visible');
        return;
      }

      setTimeout(() => {
        loadingScreen.classList.add('done');
      }, 200);

      setTimeout(() => {
        gateCard.classList.add('visible');
      }, 500);
    }

    /* ============================================================
       FIREFLY GENERATOR
    ============================================================ */
    const FIREFLY_COLORS = [
      'color-yellowgreen',
      'color-amber',
      'color-gold',
      'color-bluewhite',
      'color-warmwhite'
    ];

    function createFireflies() {
      firefliesWrap.innerHTML = '';
      const count     = isMobile ? 12 : 20;
      const riseCount = Math.floor(count * 0.15);
      const fragment  = document.createDocumentFragment();

      for (let i = 0; i < count; i++) {
        const dot   = document.createElement('span');
        const color = FIREFLY_COLORS[Math.floor(Math.random() * FIREFLY_COLORS.length)];
        dot.className = 'firefly ' + color;

        if (i < riseCount) {
          dot.classList.add('rise');
          dot.style.left   = (Math.random() * 90 + 5).toFixed(1) + '%';
          dot.style.bottom = (-4 + Math.random() * 8).toFixed(1) + '%';
          dot.style.top    = 'auto';
          dot.style.setProperty('--rx', (Math.random() * 60 - 30).toFixed(0) + 'px');
        } else {
          dot.style.left = (Math.random() * 97).toFixed(1) + '%';
          dot.style.top  = (Math.random() * 92).toFixed(1) + '%';
        }

        const size       = (Math.random() * (isMobile ? 3.0 : 3.5) + (isMobile ? 3.5 : 2.5)).toFixed(1);
        const driftDur   = (Math.random() * 10 + 10).toFixed(1);
        const flickDur   = (Math.random() * 5  + 4.0).toFixed(1);
        const driftDelay = (Math.random() * 8).toFixed(2);
        const flickDelay = (Math.random() * 5).toFixed(2);

        dot.style.width             = size + 'px';
        dot.style.height            = size + 'px';
        dot.style.animationDuration = driftDur + 's, ' + flickDur + 's';
        dot.style.animationDelay    = driftDelay + 's, ' + flickDelay + 's';

        fragment.appendChild(dot);
      }

      firefliesWrap.appendChild(fragment);
    }

    /* ============================================================
       CODE MESSAGE HELPER
    ============================================================ */
    function setMessage(text, type) {
      codeMessage.textContent = text;
      codeMessage.className   = 'code-message show';
      if (type) codeMessage.classList.add(type);
    }

    function clearMessage() {
      codeMessage.textContent = '';
      codeMessage.className   = 'code-message';
    }

    /* ============================================================
       BUTTON LOADING STATE
    ============================================================ */
    function setLoading(on) {
      enterBtn.disabled = on;
      if (on) {
        btnText.classList.add('hidden');
        btnLoader.classList.add('active');
      } else {
        btnText.classList.remove('hidden');
        btnLoader.classList.remove('active');
      }
    }

    /* ============================================================
       CHAOS SYSTEM
       Tier-based messages for wrong attempts.
       Gets progressively more unhinged.
    ============================================================ */
    let attempts = Number(sessionStorage.getItem(ATTEMPT_KEY)) || 0;

    const TIERS = [
      {
        max: 2,
        messages: [
          'The forest tilts its head.',
          'That code does not belong here.',
          'A branch creaks softly… no.',
          'Something about that feels wrong.',
          'The trees are quiet. Try again.'
        ]
      },
      {
        max: 5,
        messages: [
          'The forest pauses.',
          'It senses hesitation.',
          'That still is not correct.',
          'The trees whisper… no.',
          'Are you sure that\'s right?'
        ]
      },
      {
        max: 9,
        messages: [
          'Check your messages again.',
          'That\'s not the code you were given.',
          'Try copying it exactly.',
          'You were told the code. Use it.',
          'The forest is starting to notice you.'
        ]
      },
      {
        max: 14,
        messages: [
          'Are you guessing??',
          'This is getting concerning.',
          'Be serious.',
          'We are starting to worry.',
          'The forest does not like this.'
        ]
      },
      {
        max: 19,
        messages: [
          'WHO TOLD YOU ABOUT THIS SITE???',
          'This is getting embarrassing.',
          'The forest is losing patience.',
          'You do not belong here.',
          'Please stop.'
        ]
      },
      {
        max: 24,
        messages: [
          'WHY are you trying this hard???',
          'We are very concerned.',
          'This feels personal now.',
          'The forest remembers faces.',
          'Emily will hear about this.'
        ]
      },
      {
        max: 29,
        messages: [
          'The forest is furious.',
          'You have woken something.',
          'Turn back. Now.',
          'This was your last warning.',
          'The trees are closing in.'
        ]
      }
    ];

    function getChaosMessage() {
      for (const tier of TIERS) {
        if (attempts <= tier.max) {
          return tier.messages[Math.floor(Math.random() * tier.messages.length)];
        }
      }
      return 'The forest has had enough.';
    }

    function shakeCard() {
      if (attempts >= 10) {
        gateCard.classList.remove('chaos-shake');
        void gateCard.offsetWidth;
        gateCard.classList.add('chaos-shake');
        gateCard.addEventListener('animationend', () => {
          gateCard.classList.remove('chaos-shake');
        }, { once: true });
      }
    }

    function flickerScreen() {
      forest.classList.remove('flicker');
      void forest.offsetWidth;
      forest.classList.add('flicker');
      forest.addEventListener('animationend', () => {
        forest.classList.remove('flicker');
      }, { once: true });
    }

    function redTintFlash() {
      forest.classList.remove('red-tint');
      void forest.offsetWidth;
      forest.classList.add('red-tint');
      forest.addEventListener('animationend', () => {
        forest.classList.remove('red-tint');
      }, { once: true });
    }

    /* ============================================================
       LOCK SYSTEM
       After 30 bad attempts → 5 minute lockout
    ============================================================ */
    function isLocked() {
      const until = Number(localStorage.getItem(LOCK_KEY)) || 0;
      return Date.now() < until;
    }

    function getRemainingMs() {
      const until = Number(localStorage.getItem(LOCK_KEY)) || 0;
      return Math.max(0, until - Date.now());
    }

    function formatTime(ms) {
      const secs = Math.ceil(ms / 1000);
      const m    = Math.floor(secs / 60);
      const s    = secs % 60;
      return m > 0 ? m + 'm ' + s + 's' : s + 's';
    }

    function updateLockUI() {
      if (!isLocked()) {
        enterBtn.disabled = false;
        return false;
      }
      const remaining = getRemainingMs();
      enterBtn.disabled = true;
      setMessage(
        'The forest has sealed itself. Return in ' + formatTime(remaining) + '.',
        'locked'
      );
      return true;
    }

    /* start lock countdown if already locked on page load */
    if (isLocked()) {
      updateLockUI();
      const lockInterval = setInterval(() => {
        if (!isLocked()) {
          clearInterval(lockInterval);
          enterBtn.disabled = false;
          setMessage('The forest has loosened its grip.', '');
          setTimeout(clearMessage, 2500);
          return;
        }
        updateLockUI();
      }, 1000);
    }

    /* ============================================================
       SUCCESS TRANSITION
       1. Fireflies converge to card center
       2. Screen brightens
       3. Redirect fires
    ============================================================ */
    function runSuccessTransition(guestName) {
      /* converge fireflies */
      convergeCenter.innerHTML = '';
      const amount = 22;
      const colors = ['orange', 'plum', 'gold'];

      for (let i = 0; i < amount; i++) {
        const orb   = document.createElement('span');
        const color = colors[Math.floor(Math.random() * colors.length)];
        orb.className = 'converge-firefly ' + color;
        orb.style.setProperty('--startX', (Math.random() * 220 - 110).toFixed(0) + 'px');
        orb.style.setProperty('--startY', (Math.random() * 220 - 110).toFixed(0) + 'px');
        orb.style.animationDelay = (Math.random() * 0.15) + 's';
        convergeCenter.appendChild(orb);
      }

      convergeWrap.classList.add('show');

      /* brighten screen */
      setTimeout(() => {
        successOverlay.classList.add('active');
      }, 400);

      /* redirect */
      setTimeout(() => {
        window.location.href = URL_TRANSITION2;
      }, 1600);
    }

    /* ============================================================
       CODE VALIDATION
       1. Check if locked
       2. Check if code exists in GUESTS
       3. Check if code already claimed by another device
       4. If valid + unclaimed → claim it, grant access, redirect
       5. If valid + claimed by THIS device → grant access (returning)
       6. If invalid → chaos system
    ============================================================ */
    function validateCode() {
      if (updateLockUI()) return;

      const entered = codeInput.value.toUpperCase().trim();

      if (!entered) {
        setMessage('The forest needs to hear something.', '');
        return;
      }

      /* check guests.js is loaded */
      if (typeof GUESTS === 'undefined') {
        showPopup('The guest list could not be loaded. Please refresh and try again.');
        return;
      }

      const guestName = GUESTS[entered];

      /* ── VALID CODE ─────────────────────────────────────── */
      if (guestName) {

        const claimKey     = CLAIMED_PREFIX + entered;
        const claimedBy    = localStorage.getItem(claimKey);

        /* code claimed by a DIFFERENT device */
        if (claimedBy && claimedBy !== DEVICE_ID) {
          codeInput.classList.add('error');
          setTimeout(() => codeInput.classList.remove('error'), 500);
          claimedNotice.classList.add('show');
          setMessage('This code has already been claimed.', 'claimed');
          return;
        }

        /* valid — claim it on this device */
        localStorage.setItem(claimKey, DEVICE_ID);
        localStorage.setItem(ACCESS_KEY, 'true');
        localStorage.setItem(GUEST_KEY,  guestName);
        sessionStorage.setItem(GUEST_ATT_KEY, String(attempts));

        /* success UI */
        codeInput.classList.remove('error');
        codeInput.classList.add('glow');
        setMessage('The forest recognizes you.', 'success');

        setTimeout(() => {
          setMessage('A path opens, ' + guestName.split(' ')[0] + '.', 'success');
        }, 600);

        setLoading(true);

        setTimeout(() => {
          runSuccessTransition(guestName);
        }, 1200);

        return;
      }

      /* ── INVALID CODE ───────────────────────────────────── */
      attempts++;
      sessionStorage.setItem(ATTEMPT_KEY, String(attempts));

      codeInput.classList.add('error');
      setTimeout(() => codeInput.classList.remove('error'), 400);

      shakeCard();

      /* special messages at key thresholds */
      if (attempts === 15) {
        flickerScreen();
        setMessage('Girl… are you even invited???', '');
        return;
      }

      if (attempts === 25) {
        redTintFlash();
        setMessage('WHO TOLD YOU TO COME???', '');
        return;
      }

      setMessage(getChaosMessage(), '');

      /* lockout at 30 */
      if (attempts >= 30) {
        const lockUntil = Date.now() + (5 * 60 * 1000);
        localStorage.setItem(LOCK_KEY, String(lockUntil));
        enterBtn.disabled = true;

        setMessage('The forest has sealed itself to you.', 'locked');

        const lockInterval = setInterval(() => {
          if (!isLocked()) {
            clearInterval(lockInterval);
            enterBtn.disabled = false;
            setMessage('The forest has loosened its grip.', '');
            setTimeout(clearMessage, 2500);
            return;
          }
          updateLockUI();
        }, 1000);
      }
    }

    /* ============================================================
       INPUT HANDLERS
    ============================================================ */

    /* auto-caps, no spaces as you type */
    codeInput.addEventListener('input', () => {
      const pos = codeInput.selectionStart;
      codeInput.value = codeInput.value.toUpperCase().replace(/\s+/g, '');
      codeInput.setSelectionRange(pos, pos);
      claimedNotice.classList.remove('show');
      if (codeInput.classList.contains('error')) {
        codeInput.classList.remove('error');
      }
    });

    /* enter key submits */
    codeInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        validateCode();
      }
    });

    /* button click */
    enterBtn.addEventListener('click', validateCode);

    /* ============================================================
       INIT
    ============================================================ */
    function init() {
      /* check if already authenticated — skip page */
      if (checkExistingAccess()) return;

      initLoadSequence();
      createFireflies();

      /* resize handler */
      let resizeTimer;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(createFireflies, 300);
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

  })();
  </script>

</body>
