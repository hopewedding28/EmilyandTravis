<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#060b06" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>Emily &amp; Travis · 09.23.28</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Zen+Loop&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #060b06;
    }

    /* ── BACKGROUND ── */
    .splash {
      position: relative;
      width: 100%; height: 100vh;
      background: url("assets/backgrounds/landing.png") center / cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* dark overlay — title card feel */
    .splash::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(4, 8, 4, 0.52);
      z-index: 1;
    }

    /* extra vignette around edges */
    .splash::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse at center,
        transparent 30%,
        rgba(4, 6, 4, 0.55) 70%,
        rgba(2, 4, 2, 0.85) 100%
      );
      z-index: 2;
      pointer-events: none;
    }

    /* ── FIREFLIES ── */
    .fireflies {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
    }

    .firefly {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation-name: driftFloat, flickerGlow;
      animation-timing-function: linear, ease-in-out;
      animation-iteration-count: infinite, infinite;
      will-change: transform, opacity;
    }

    .firefly.color-gold {
      background: radial-gradient(circle, rgba(255,240,140,0.98) 0%, rgba(243,211,122,0.55) 48%, transparent 100%);
      box-shadow: 0 0 8px rgba(243,220,120,0.65), 0 0 20px rgba(230,200,100,0.28);
    }
    .firefly.color-amber {
      background: radial-gradient(circle, rgba(255,180,60,0.98) 0%, rgba(240,150,30,0.55) 48%, transparent 100%);
      box-shadow: 0 0 8px rgba(255,170,50,0.65), 0 0 20px rgba(240,140,20,0.28);
    }
    .firefly.color-warmwhite {
      background: radial-gradient(circle, rgba(255,252,230,0.98) 0%, rgba(255,245,200,0.55) 48%, transparent 100%);
      box-shadow: 0 0 8px rgba(255,248,220,0.65), 0 0 20px rgba(255,240,190,0.28);
    }

    @keyframes driftFloat {
      0%   { transform: translate3d(0,0,0) scale(0.88); }
      20%  { transform: translate3d(18px,-26px,0) scale(1.07); }
      40%  { transform: translate3d(-12px,-42px,0) scale(0.94); }
      60%  { transform: translate3d(15px,-30px,0) scale(1.11); }
      80%  { transform: translate3d(-9px,-15px,0) scale(0.97); }
      100% { transform: translate3d(-5px,0,0) scale(0.90); }
    }

    @keyframes flickerGlow {
      0%,  100% { opacity: 0.04; }
      10%        { opacity: 0.65; }
      26%        { opacity: 0.10; }
      48%        { opacity: 0.78; }
      66%        { opacity: 0.16; }
      82%        { opacity: 0.52; }
    }

    /* ── CONTENT ── */
    .content {
      position: relative;
      z-index: 5;
      text-align: center;
      padding: 2rem;
      opacity: 0;
      animation: riseIn 1.2s cubic-bezier(0.25,0.8,0.25,1) forwards;
      animation-delay: 400ms;
    }

    .names {
      font-family: 'Sacramento', cursive;
      font-size: clamp(4rem, 14vw, 9rem);
      color: rgba(248, 242, 224, 0.97);
      line-height: 1.05;
      text-shadow:
        0 0  8px  rgba(0,0,0,0.95),
        0 4px 20px rgba(0,0,0,0.90),
        0 0  60px rgba(243,211,122,0.20);
      letter-spacing: 0.02em;
    }

    .amp {
      font-size: 0.65em;
      color: rgba(243, 211, 122, 0.85);
      display: inline-block;
      margin: 0 0.08em;
      vertical-align: middle;
    }

    .date {
      font-family: 'Zen Loop', sans-serif;
      font-size: clamp(0.75rem, 2vw, 1rem);
      color: rgba(240, 234, 214, 0.60);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-top: 0.8rem;
      text-shadow: 0 1px 8px rgba(0,0,0,0.90);
    }

    /* progress bar */
    .progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      background: linear-gradient(to right, transparent, rgba(243,211,122,0.6), transparent);
      width: 0%;
      animation: progress 5s linear forwards;
      animation-delay: 600ms;
      z-index: 6;
    }

    @keyframes progress {
      from { width: 0%; }
      to   { width: 100%; }
    }

    /* page leave */
    body.leaving .content {
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    body.leaving .splash::before {
      background: rgba(4,8,4,0.85);
      transition: background 0.8s ease;
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* mist */
    .mist {
      position: absolute;
      inset: auto 0 0 0;
      height: 25vh;
      z-index: 4;
      background:
        radial-gradient(ellipse at 30% 100%, rgba(255,255,255,0.018), transparent 38%),
        radial-gradient(ellipse at 60% 100%, rgba(255,255,255,0.028), transparent 44%);
      filter: blur(20px);
      opacity: 0.75;
      pointer-events: none;
      animation: mistDrift 20s ease-in-out infinite alternate;
    }

    @keyframes mistDrift {
      0%   { transform: translateX(-2%) translateY(0); opacity: 0.60; }
      100% { transform: translateX(2%) translateY(-1%); opacity: 0.85; }
    }

    @media (prefers-reduced-motion: reduce) {
      .content   { animation: none; opacity: 1; }
      .firefly   { display: none; }
      .mist      { animation: none; }
      .progress-bar { animation: none; }
    }
  </style>
</head>
<body>

  <div class="splash">
    <div class="fireflies" id="fireflies" aria-hidden="true"></div>
    <div class="mist" aria-hidden="true"></div>

    <div class="content">
      <div class="names">
        Emily <span class="amp">&</span> Travis
      </div>
      <div class="date">September 23, 2028 &nbsp;·&nbsp; Lums Pond, Delaware</div>
    </div>

    <div class="progress-bar" aria-hidden="true"></div>
  </div>

  <script>
  (function() {
    'use strict';

    const REDIRECT_URL = 'transition.html';
    const DELAY_MS     = 5000;

    // fireflies
    const wrap   = document.getElementById('fireflies');
    const colors = ['color-gold','color-amber','color-warmwhite'];
    const count  = window.matchMedia('(hover:none)').matches ? 12 : 20;
    const frag   = document.createDocumentFragment();

    for (let i = 0; i < count; i++) {
      const dot   = document.createElement('span');
      dot.className = 'firefly ' + colors[Math.floor(Math.random() * colors.length)];
      dot.style.left = (Math.random() * 97).toFixed(1) + '%';
      dot.style.top  = (Math.random() * 92).toFixed(1) + '%';
      const size = (Math.random() * 3 + 2.5).toFixed(1);
      dot.style.width  = size + 'px';
      dot.style.height = size + 'px';
      dot.style.animationDuration = (Math.random()*10+10).toFixed(1)+'s, '+(Math.random()*5+4).toFixed(1)+'s';
      dot.style.animationDelay    = (Math.random()*8).toFixed(2)+'s, '+(Math.random()*5).toFixed(2)+'s';
      frag.appendChild(dot);
    }
    wrap.appendChild(frag);

    // auto-forward
    setTimeout(() => {
      document.body.classList.add('leaving');
      setTimeout(() => {
        window.location.href = REDIRECT_URL;
      }, 700);
    }, DELAY_MS);

  })();
  </script>

</body>
</html>
