<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emily and Travis</title>

<link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light+Two&family=Zen+Loop&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  overflow: hidden;
}

.hero {
  height: 100vh;
  background: url("assets/backgrounds/gate.png") center / cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: transform 0.7s ease, filter 0.7s ease;
}

.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 1;
  background: radial-gradient(circle at center,
    rgba(10,10,10,0.3) 0%,
    rgba(10,10,10,0.6) 70%,
    rgba(10,10,10,0.8) 100%);
}

.content {
  position: relative;
  z-index: 2;
  text-align: center;
  max-width: 600px;
  padding: 20px;
  color: #f5e6b8;
  transform: translateY(-85px);
}

/* FADE ONLY FOR TEXT */
.fade {
  opacity: 0;
  transform: translateY(10px);
  animation: fadeIn 1.2s ease forwards;
}

h1.fade { animation-delay: 0.5s; }
p.fade { animation-delay: 1.2s; }

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

h1 {
  font-family: 'Shadows Into Light Two', cursive;
  font-size: 3.4rem;
  margin-bottom: 1.2rem;
  color: #f3d37a;
  text-shadow: 0 0 20px rgba(243,211,122,0.7);
}

p {
  font-family: 'Zen Loop', sans-serif;
  font-size: 1.05rem;
  margin-bottom: 1.6rem;
  line-height: 1.6;
  opacity: 0.9;
  letter-spacing: 0.03em;
}

.button {
  font-family: 'Zen Loop', sans-serif;
  display: inline-block;
  padding: 0.9rem 2.2rem;
  font-size: 0.95rem;
  letter-spacing: 0.08em;
  text-decoration: none;
  border-radius: 999px;
  margin-top: 1.2rem;

  color: #1a1a1a;
  font-weight: bold;

  background: radial-gradient(circle,
    #f8e7a0 0%,
    #e6c76b 60%,
    #d4af37 100%
  );

  box-shadow:
    0 0 15px rgba(243,211,122,0.5),
    0 0 30px rgba(243,211,122,0.3),
    0 4px 12px rgba(0,0,0,0.7);

  transition: all 0.25s ease;

  animation: pulse 3s ease-in-out infinite;
}

.button:hover {
  transform: translateY(-2px) scale(1.03);
  box-shadow:
    0 0 25px rgba(243,211,122,0.8),
    0 0 50px rgba(243,211,122,0.5),
    0 6px 18px rgba(0,0,0,0.8);
}

@keyframes pulse {
  0%, 100% {
    box-shadow:
      0 0 15px rgba(243,211,122,0.5),
      0 0 30px rgba(243,211,122,0.3),
      0 4px 12px rgba(0,0,0,0.7);
  }
  50% {
    box-shadow:
      0 0 25px rgba(243,211,122,0.7),
      0 0 45px rgba(243,211,122,0.5),
      0 6px 18px rgba(0,0,0,0.8);
  }
}

.hero.zoom {
  transform: scale(1.12);
  filter: brightness(1.2);
}

@media (max-width: 768px) {
  h1 { font-size: 2.6rem; }
  p { font-size: 0.95rem; }
}
</style>
</head>

<body>

<div class="hero" id="hero">
  <div class="content">

    <h1 class="fade">You’ve Been Summoned</h1>

    <p class="fade">
      Beyond the trees, a celebration is waiting.<br>
      Step inside to begin your RSVP for Emily and Travis’s wedding.
    </p>

    <a href="transition.html" class="button" id="enterBtn">
      STEP INSIDE
    </a>

  </div>
</div>

<script>
const btn = document.getElementById("enterBtn");
const hero = document.getElementById("hero");

btn.addEventListener("click", function(e) {
  e.preventDefault();
  hero.classList.add("zoom");

  setTimeout(() => {
    window.location.href = "transition.html";
  }, 500);
});
</script>

</body>
</html>
