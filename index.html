<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emily & Travis</title>

<link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light+Two&family=Zen+Loop&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  overflow: hidden;
}

.hero {
  height: 100vh;
  background: url("assets/backgrounds/gate.png") center / cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* overlay BELOW content */
.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 0;
  background: radial-gradient(circle at center,
    rgba(10,10,10,0.3) 0%,
    rgba(10,10,10,0.6) 70%,
    rgba(10,10,10,0.8) 100%);
}

.content {
  position: relative;
  z-index: 10; /* force ABOVE everything */
  text-align: center;
  max-width: 600px;
  padding: 20px;
  color: #f5e6b8;
  transform: translateY(-85px);
}

/* text animation */
.fade {
  opacity: 0;
  transform: translateY(10px);
  animation: fadeIn 1.2s ease forwards;
}

h1.fade { animation-delay: 0.5s; }
p.fade { animation-delay: 1.2s; }

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

h1 {
  font-family: 'Shadows Into Light Two', cursive;
  font-size: 3.4rem;
  margin-bottom: 1.2rem;
  color: #f3d37a;
}

p {
  font-family: 'Zen Loop', sans-serif;
  font-size: 1.05rem;
  margin-bottom: 1.6rem;
  line-height: 1.6;
}

/* DEBUG BUTTON — BRIGHT RED */
.button {
  display: inline-block;
  padding: 1rem 2.5rem;
  margin-top: 1.2rem;

  background: red;        /* TEMP DEBUG COLOR */
  color: white;
  font-weight: bold;
  border-radius: 999px;

  position: relative;
  z-index: 9999;          /* FORCE ON TOP */
}
</style>
</head>

<body>

<div class="hero">
  <div class="content">

    <h1 class="fade">You’ve Been Summoned</h1>

    <p class="fade">
      Beyond the trees, a celebration is waiting.<br>
      Step inside to begin your RSVP for Emily and Travis’s wedding.
    </p>

    <a href="transition.html" class="button">
      STEP INSIDE
    </a>

  </div>
</div>

</body>
</html>
