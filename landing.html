<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>

<link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light+Two&family=Zen+Loop&display=swap" rel="stylesheet">

<style>

/* =========================
   ROOT + RESET
========================= */
:root {
  --bg-dark: #0a0a0a;
  --text-main: #f0ead6;
  --gold: #f3d37a;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* =========================
   BODY + FOREST
========================= */
body {
  min-height: 100vh;
  background: url("assets/backgrounds/gate.png") center / cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Zen Loop', sans-serif;
  overflow: hidden;
  position: relative;
}

/* dark vignette */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(
    circle at center,
    rgba(10,10,10,0.2) 0%,
    rgba(10,10,10,0.5) 60%,
    rgba(10,10,10,0.75) 100%
  );
  z-index: 1;
}

/* =========================
   FIREFLY FIELD
========================= */
.fireflies {
  position: absolute;
  inset: 0;
  z-index: 2;
  pointer-events: none;
}

.firefly {
  position: absolute;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(255,245,180,0.9);
  box-shadow:
    0 0 10px rgba(255,245,180,0.7),
    0 0 20px rgba(255,220,120,0.3);
  opacity: 0;
  animation: driftGlow infinite ease-in-out;
}

@keyframes driftGlow {
  0% { opacity: 0; transform: scale(0.6); }
  20% { opacity: 0.6; }
  50% { opacity: 1; transform: translateY(-20px); }
  80% { opacity: 0.5; }
  100% { opacity: 0; transform: translateY(-40px); }
}

/* =========================
   SCENE
========================= */
.scene {
  position: relative;
  z-index: 3;
  width: 100%;
  max-width: 900px;
  text-align: center;
  padding: 3rem 2rem;
  color: var(--text-main);
}

/* =========================
   TEXT
========================= */
.greeting {
  font-family: 'Shadows Into Light Two', cursive;
  font-size: clamp(2rem, 4vw, 2.8rem);
  line-height: 1.6;
  opacity: 0;
  animation: fadeIn 1.4s ease forwards 0.4s;
  text-shadow:
    0 2px 10px rgba(0,0,0,0.7),
    0 0 20px rgba(243,211,122,0.15);
}

.sub {
  margin-top: 0.8rem;
  font-size: 1.1rem;
  opacity: 0;
  animation: fadeIn 1.2s ease forwards 1.8s;
  color: rgba(240,234,214,0.75);
}

/* =========================
   FADE ANIMATIONS
========================= */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeOut {
  to { opacity: 0; transform: scale(0.98); }
}

.scene.leaving {
  animation: fadeOut 0.9s ease forwards;
}

/* =========================
   SUBTLE GLOW PULSE
========================= */
.glow {
  animation: glowPulse 3s ease-in-out infinite;
}

@keyframes glowPulse {
  0%, 100% { text-shadow: 0 0 10px rgba(243,211,122,0.2); }
  50% { text-shadow: 0 0 20px rgba(243,211,122,0.4); }
}

</style>
</head>

<body>

<div class="fireflies" id="fireflies"></div>

<div class="scene" id="scene"></div>

<script>

/* =========================
   STORAGE
========================= */
const access = sessionStorage.getItem("rsvpAccess");
const name = sessionStorage.getItem("guestName") || "guest";
const attempts = Number(sessionStorage.getItem("guestAttempts")) || 0;
const visited = sessionStorage.getItem("visitedLanding");

/* =========================
   ACCESS GATE
========================= */
if (access !== "true") {
  document.getElementById("scene").innerHTML = `
    <p class="greeting">The forest does not recognize you.</p>
    <p class="sub">you are sent back</p>
  `;
  setTimeout(() => {
    window.location.href = "rsvp.html";
  }, 1500);
  throw new Error("Access denied");
}

/* =========================
   JUDGMENT SYSTEM
========================= */
function getContent() {

  if (visited) {
    return {
      greeting: `Welcome back, ${name}.`,
      sub: "the forest remembers you",
      delay: 2200
    };
  }

  if (attempts <= 3) {
    return {
      greeting: `Oh hi there!<br>Emily and Travis have been expecting you.`,
      sub: "you found the path easily",
      delay: 3600
    };
  }

  if (attempts <= 10) {
    return {
      greeting: `Oh… hi there, ${name}.`,
      sub: "you got there eventually",
      delay: 4000
    };
  }

  if (attempts <= 20) {
    return {
      greeting: `${name}…`,
      sub: "the forest noticed the struggle",
      delay: 4400
    };
  }

  return {
    greeting: `${name}.`,
    sub: "that took longer than expected",
    delay: 4800
  };
}

/* =========================
   RENDER
========================= */
const scene = document.getElementById("scene");
const data = getContent();

scene.innerHTML = `
  <p class="greeting glow">${data.greeting}</p>
  <p class="sub">${data.sub}</p>
`;

sessionStorage.setItem("visitedLanding", "true");

/* =========================
   FIREFLY GENERATOR
========================= */
function createFireflies() {
  const wrap = document.getElementById("fireflies");
  wrap.innerHTML = "";

  for (let i = 0; i < 20; i++) {
    const dot = document.createElement("span");
    dot.className = "firefly";

    dot.style.left = Math.random() * 100 + "%";
    dot.style.top = Math.random() * 100 + "%";
    dot.style.animationDuration = (Math.random() * 8 + 6) + "s";
    dot.style.animationDelay = Math.random() * 5 + "s";

    wrap.appendChild(dot);
  }
}

createFireflies();

/* =========================
   TRANSITION → HOME
========================= */
setTimeout(() => {
  scene.classList.add("leaving");
}, data.delay);

setTimeout(() => {
  window.location.href = "home.html";
}, data.delay + 900);

</script>

</body>
</html>
