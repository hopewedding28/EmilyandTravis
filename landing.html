<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>

<link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light+Two&family=Zen+Loop&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: url("assets/backgrounds/gate.png") center / cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Zen Loop', sans-serif;
  overflow: hidden;
}

body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center,
    rgba(10,10,10,0.3) 0%,
    rgba(10,10,10,0.7) 100%);
}

.scene {
  position: relative;
  width: 100%;
  max-width: 600px;
  text-align: center;
  padding: 2rem;
  color: #f0ead6;
}

.greeting {
  font-family: 'Shadows Into Light Two', cursive;
  font-size: clamp(1.5rem, 3vw, 1.9rem);
  line-height: 1.7;
  opacity: 0;
  animation: fadeIn 1.4s ease forwards 0.4s;
}

.sub {
  margin-top: 0.6rem;
  font-size: 0.95rem;
  opacity: 0;
  animation: fadeIn 1.2s ease forwards 1.8s;
  color: rgba(240,234,214,0.7);
}

.fairies {
  margin-top: 2.5rem;
  height: 40px;
  position: relative;
  opacity: 0;
  animation: fadeIn 1s ease forwards 2.4s;
}

.dot {
  position: absolute;
  top: 50%;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: rgba(255,245,180,0.9);
  box-shadow: 0 0 10px rgba(255,245,180,0.7);
  transform: translateY(-50%);
  animation: fairyFloat var(--dur) ease-in-out infinite var(--delay);
}

.dot:nth-child(1) { left: calc(50% - 60px); --dur: 2.1s; --delay: 0s; }
.dot:nth-child(2) { left: calc(50% - 10px); --dur: 2.6s; --delay: 0.4s; }
.dot:nth-child(3) { left: calc(50% + 40px); --dur: 1.9s; --delay: 0.8s; }
.dot:nth-child(4) { left: calc(50% - 110px); --dur: 2.4s; --delay: 0.2s; }
.dot:nth-child(5) { left: calc(50% + 90px); --dur: 2.2s; --delay: 0.6s; }

@keyframes fairyFloat {
  0%, 100% { transform: translateY(-50%); opacity: 0.4; }
  50% { transform: translateY(calc(-50% - 10px)); opacity: 1; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeOut {
  to { opacity: 0; }
}

.scene.leaving {
  animation: fadeOut 0.8s ease forwards;
}
</style>
</head>

<body>

<div class="scene" id="scene"></div>

<script>
// =========================
// STORAGE KEYS
// =========================
const ACCESS_KEY = "rsvpAccess";
const NAME_KEY = "guestName";
const ATTEMPTS_KEY = "guestAttempts";

// =========================
// SESSION DATA
// =========================
const access = sessionStorage.getItem(ACCESS_KEY);
const name = sessionStorage.getItem(NAME_KEY) || "guest";
const attempts = Number(sessionStorage.getItem(ATTEMPTS_KEY)) || 0;
const hasVisited = sessionStorage.getItem("visitedLanding");

// =========================
// ACCESS GATING
// =========================
if (access !== "true") {
  // ❌ Not allowed in
  setTimeout(() => {
    window.location.href = "rsvp.html";
  }, 1200);

  document.getElementById("scene").innerHTML = `
    <p class="greeting">The forest does not recognize you.</p>
    <p class="sub">you are sent back</p>
  `;
  throw new Error("Access denied");
}

// =========================
// JUDGMENT MODE
// =========================
function getSceneContent() {

  // 🌿 RETURNING USER
  if (hasVisited) {
    return {
      greeting: `Welcome back, ${name}.`,
      sub: "the forest remembers you",
      delay: 2500
    };
  }

  // 🌿 FIRST TIME (JUDGMENT)
  if (attempts <= 3) {
    return {
      greeting: `Oh hi there!<br>Emily and Travis have been expecting you.`,
      sub: "you found the path easily",
      delay: 4000
    };
  }

  if (attempts <= 10) {
    return {
      greeting: `Oh… hi there, ${name}.`,
      sub: "you got there eventually",
      delay: 4200
    };
  }

  if (attempts <= 20) {
    return {
      greeting: `${name}…`,
      sub: "the forest noticed the struggle",
      delay: 4500
    };
  }

  return {
    greeting: `${name}.`,
    sub: "that took longer than expected",
    delay: 4800
  };
}

// =========================
// RENDER
// =========================
const scene = document.getElementById("scene");
const data = getSceneContent();

scene.innerHTML = `
  <p class="greeting">${data.greeting}</p>
  <p class="sub">${data.sub}</p>

  <div class="fairies">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
`;

// mark as visited AFTER first render
sessionStorage.setItem("visitedLanding", "true");

// =========================
// TRANSITION FLOW
// =========================
setTimeout(() => {
  scene.classList.add("leaving");
}, data.delay);

setTimeout(() => {
  window.location.href = "transition.html";
}, data.delay + 800);

</script>

</body>
</html>
